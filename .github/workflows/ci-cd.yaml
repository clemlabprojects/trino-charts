# This workflow:
#   - lints the chart, runs tests and verifies documentation is up to date
# Additionally if the event isn't a pull-request (and hence a merge/push to main):
#   - sync README to gh-pages branch
#   - release a new chart version if the version isn't already released
name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

# Cancel previous PR builds.
concurrency:
  # Cancel all workflow runs except latest within a concurrency group. This is achieved by defining a concurrency group for the PR.
  # Non-PR builds have singleton concurrency groups.
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0
      - name: Add chart dependencies
        run: helm repo add gitlab https://charts.gitlab.io
      - name: Lint charts
        run: ct lint --charts=charts/trino,charts/gateway,charts/ollama,charts/gitlab --validate-maintainers=false --dependency-update

  changes:
    runs-on: ubuntu-latest
    name: changed charts files
    outputs:
      trino-changed: ${{ steps.filter.outputs.trino }}
      gateway-changed: ${{ steps.filter.outputs.gateway }}
      ollama-changed: ${{ steps.filter.outputs.ollama }}
      gitlab-changed: ${{ steps.filter.outputs.gitlab }}
    steps:
      - uses: actions/checkout@v5
      - name: Get changed related files
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        id: filter
        with:
          filters: |
            trino:
              - 'charts/trino/**'
              - 'tests/trino/**'
              - '.helmignore'
              - '.github/**'
              - '.gitignore'
            gateway:
              - 'charts/gateway/**'
              - 'tests/gateway/**'
              - '.helmignore'
              - '.github/**'
              - '.gitignore'
            ollama:
              - 'charts/ollama/**'
              - '.helmignore'
              - '.github/**'
            gitlab:
              - 'charts/gitlab/**'
              - '.helmignore'
              - '.github/**'

  test:
    runs-on: ubuntu-latest
    name: test trino ${{ matrix.label }}
    needs: [changes]
    if: ${{needs.changes.outputs.trino-changed == 'true'}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: default, args: '' }
          # last Trino version that requires JDK 21
          - { label: 446, args: '-a "--set image.tag=446"' }
          # last Trino version that requires JDK 17
          - { label: 435, args: '-a "--set image.tag=435"' }
          # skip cleanup to test deploying multiple releases in a single namespace
          - { label: overrides, args: '-s -t default,overrides' }
    steps:
      - uses: actions/checkout@v5
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0
      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0
      - name: Create kind cluster
        uses: helm/kind-action@v1.12.0
        with:
          version: v0.30.0
      - name: Run tests
        run: ./tests/trino/test.sh ${{ matrix.args }}

  test-gateway:
    runs-on: ubuntu-latest
    name: test gateway ${{ matrix.label }}
    needs: [changes]
    if: ${{needs.changes.outputs.gateway-changed == 'true'}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: default, args: '' }
    steps:
      - uses: actions/checkout@v5
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0
      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0
      - name: Create kind cluster
        uses: helm/kind-action@v1.12.0
        with:
          version: v0.30.0
      - name: Run gateway tests
        run: ./tests/gateway/test.sh ${{ matrix.args }}

  test-ollama:
    runs-on: ubuntu-latest
    name: test ollama ${{ matrix.label }}
    needs: [changes]
    if: ${{needs.changes.outputs.ollama-changed == 'true'}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: default, args: '' }
    steps:
      - uses: actions/checkout@v5
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0
      - name: Run ollama tests
        run: ./tests/ollama/test.sh ${{ matrix.args }}

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: pre-commit/action@v3.0.1

  # Everything above is CI, everything here and below is for releases and runs only on non-pull-request events
  sync-readme:
    needs: [lint, test, test-gateway, test-ollama, docs]
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && github.event_name != 'pull_request'}}
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          path: main
      - name: Checkout gh-pages
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages
      - name: Copy all README files from main to gh-pages
        run: |
          cd main
          # cp --parents preserves directory structure
          find . -name 'README.md' -exec cp --parents '{}' "../gh-pages/" ';'
      - name: Commit changes to gh-pages and push
        run: |
          cd gh-pages
          git add .
          git config user.name "GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          # Commit only if changes exist to avoid failure in this step
          git diff-index --quiet HEAD || git commit --signoff -m "Sync READMEs from main"
          git push

  release:
    needs: [lint, test, test-gateway, test-ollama, docs, sync-readme]
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && github.event_name != 'pull_request'}}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
      - name: Release charts
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_GENERATE_RELEASE_NOTES: true
          # If we didn't bump the chart version then we can skip the release
          CR_SKIP_EXISTING: true

  release-harbor:
    needs: [lint, test, test-gateway, test-ollama, docs, sync-readme]
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && github.event_name != 'pull_request'}}
    steps:
      - uses: actions/checkout@v5
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0
      - name: Add chart repo dependencies
        run: helm repo add gitlab https://charts.gitlab.io
      - name: Update chart dependencies
        run: |
          helm dependency update charts/ollama
          helm dependency update charts/gitlab
      - name: Login to Harbor OCI registry
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | \
            helm registry login registry.clemlab.com \
              -u "${{ secrets.HARBOR_USER }}" \
              --password-stdin
      - name: Package and push clemlab charts to Harbor OCI
        run: |
          mkdir -p /tmp/helm-packages
          for chart in ollama gitlab; do
            helm package "charts/${chart}" -d /tmp/helm-packages/
          done
          for tgz in /tmp/helm-packages/*.tgz; do
            echo "Pushing ${tgz}..."
            helm push "${tgz}" oci://registry.clemlab.com/clemlabprojects/charts
          done
