name: Publish clemlab-trino to Clemlab OCI

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - "charts/trino/**"
      - ".github/workflows/release-to-oci.yml"
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: harbor
    env:
      OCI_REGISTRY: registry.clemlab.com
      OCI_REPO: clemlabprojects/charts
      ROBOT_USER: clemlabprojects+github.actions.clemlabprojects.trino-charts
      CHART_DIR: charts/trino
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - name: Install yq
        uses: mikefarah/yq@v4.49.2

      - name: Extract chart name & version
        id: meta
        run: |
          CHART_NAME=$(yq -r '.name' "${CHART_DIR}/Chart.yaml")
          CHART_VERSION=$(yq -r '.version' "${CHART_DIR}/Chart.yaml")
          echo "chart_name=${CHART_NAME}"   >> "$GITHUB_OUTPUT"
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Chart: ${CHART_NAME}  Version: ${CHART_VERSION}"

      - name: Lint
        run: helm lint "${CHART_DIR}"

      - name: Package
        run: |
          mkdir -p dist
          helm package "${CHART_DIR}" -d dist

      - name: Login to Harbor OCI registry (via helm)
        env:
          HARBOR_USER: ${{ secrets.HARBOR_ROBOT_USERNAME }}     # robot$clemlabprojects+github.actions.clemlabprojects.trino-charts
          HARBOR_PASS: ${{ secrets.ACTIONS_CLEMLABPROJECTS }}   # robot token/password
        run: |
          echo "${{ secrets.ACTIONS_CLEMLABPROJECTS }}" > /tmp/credential.txt
          cat /tmp/credential.txt
          helm registry login 'registry.clemlab.com' --username 'robot$clemlabprojects+github.actions.clemlabprojects.trino-charts' --password-stdin < /tmp/credential.txt

      - name: Docker login to Harbor (works for Helm too)
        uses: docker/login-action@v3
        with:
          registry: registry.clemlab.com
          username: 'robot$clemlabprojects+github.actions.clemlabprojects.trino-charts'       # robot$...
          password: ${{ secrets.ACTIONS_CLEMLABPROJECTS }} 

      - name: Push package to OCI
        run: |
          for TGZ in dist/*.tgz; do
            echo "Pushing $TGZ to oci://${{ env.OCI_REGISTRY }}/${{ env.OCI_REPO }}"
            helm push "$TGZ" "oci://${{ env.OCI_REGISTRY }}/${{ env.OCI_REPO }}"
          done

      - name: Verify by pulling the just-pushed version
        run: |
          echo "Pulling back oci://${{ env.OCI_REGISTRY }}/${{ env.OCI_REPO }}/${{ steps.meta.outputs.chart_name }} --version ${{ steps.meta.outputs.chart_version }}"
          helm pull "oci://${{ env.OCI_REGISTRY }}/${{ env.OCI_REPO }}/${{ steps.meta.outputs.chart_name }}" \
            --version "${{ steps.meta.outputs.chart_version }}" --untar
          ls -la "./${{ steps.meta.outputs.chart_name }}"

      - name: Print final pull command (for logs)
        run: |
          echo "helm pull oci://${{ env.OCI_REGISTRY }}/${{ env.OCI_REPO }}/${{ steps.meta.outputs.chart_name }} --version ${{ steps.meta.outputs.chart_version }}"