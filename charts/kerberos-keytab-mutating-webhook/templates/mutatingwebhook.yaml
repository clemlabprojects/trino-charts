apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "webhook.fullname" . }}
  labels: {{- include "webhook.labels" . | nindent 4 }}
webhooks:
  - name: keytab.injector.clemlab.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    clientConfig:
      service:
        name: {{ include "webhook.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate
        port: {{ .Values.service.port }}
      caBundle: {{ required "webhook.caBundle is required" .Values.webhook.caBundle | quote }}
    rules:
      - operations: ["CREATE","UPDATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        scope: "Namespaced"
    namespaceSelector:
      matchLabels:
        {{ .Values.selectors.namespace.key }}: {{ .Values.selectors.namespace.value | quote }}
    objectSelector:
      matchLabels:
        {{ .Values.selectors.object.key }}: {{ .Values.selectors.object.value | quote }}
