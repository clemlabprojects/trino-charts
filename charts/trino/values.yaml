# Default values for trino.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Override resource names to avoid name conflicts when deploying multiple
# releases in the same namespace.
# @raw
# Example:
# ```yaml
# coordinatorNameOverride: trino-coordinator-adhoc
# workerNameOverride: trino-worker-adhoc
# nameOverride: trino-adhoc
# ```

nameOverride:
coordinatorNameOverride:
workerNameOverride:
image:
  # -- Image registry, defaults to empty, which results in DockerHub usage
  registry: ""
  # -- Repository location of the Trino image, typically `organization/imagename`
  repository: "trino"
  # -- Image tag, defaults to the Trino release version specified as `appVersion` from Chart.yaml
  tag: "476.1.3.1.0-174"
  # -- Optional digest value of the image specified as `sha256:abcd...`. A specified value overrides `tag`.
  digest: ""
  # -- When true, only the content in `repository` is used as image reference
  useRepositoryAsSoleImageReference: false
  pullPolicy: IfNotPresent

# -- An optional list of references to secrets in the same namespace to use for pulling images.
# @raw
# Example:
# ```yaml
# imagePullSecrets:
#   - name: registry-credentials
# ```
imagePullSecrets: []

busyboxImage:
  registry: ""
  repository: "busybox"
  tag: "1.36"
  digest: ""
  useRepositoryAsSoleImageReference: false
  pullPolicy: IfNotPresent

global:
  imageRegistry: "registry.clemlab.com/clemlabprojects"
  imagePullSecrets: []
  security:
    kerberos:
      enabled: true
      injectionMode: WEBHOOK # WEBHOOK | PRE_PROVISIONED
      # Single source of truth for realm
      realm: EXAMPLE.COM # can be controlled by ambari's charts.json with dynamicValues
      configMapName: trino-krb5-conf
      key: krb5.conf        # optional; defaults to "krb5.conf"
      mountPath: /etc/krb5.conf
      # How the webhook builds the principal. We keep these here so Helm and
      # the webhook share the same assumptions.
      principalMode: headless        # service | headless | auto
      principalFqdnMode: namespace   # pod | namespace
      principalTemplate: "{service}/{fqdn}@{realm}"  # only used when principalMode=service/auto

      # Where the webhook mounts the keytab + how the Secret stores the data
      keytab:
        mountPath: /etc/security/keytabs
        secretDataKey: service.keytab
        secretName: ""   # set by Ambari view when pre-provisioning keytabs
      # Optional override for worker keytabs when using pre-provisioned mode.
      # If empty, the worker falls back to the coordinator keytab settings above.
      workerKeytab:
        mountPath: /etc/security/keytabs
        secretDataKey: service.keytab
        secretName: ""

    # Labels the webhook uses (don’t change unless you changed the webhook env)
    admissionWebhook:
      injectKeytab:
        enabled: true
        needsKeytabLabelKey: security.clemlab.com/needs-keytab
        serviceLabelKey: security.clemlab.com/service

    # Authentication profile — injected by Ambari K8S view global security profile.
    # Supported modes: none | ldap | ad | oidc
    auth:
      mode: none
      oidc:
        issuerUrl: ""
        secretRef:
          name: ""               # set by OIDC_CREATE_SECRET step
          clientIdKey: "client_id"
          clientSecretKey: "client_secret"
        clientId: ""
        clientSecret: ""
        scopes: "openid email profile"
        redirectUri: ""
        userClaim: "preferred_username"
        groupsClaim: "groups"
        skipTlsVerify: false
        caSecret: ""
      ldap:
        url: ""
        bindDn: ""
        bindPassword: ""
        userDnTemplate: ""
        userSearchFilter: ""
        baseDn: ""
        groupSearchBase: ""
        groupSearchFilter: ""
        groupAuthPattern: ""
        referral: ""
        startTls: false
      ad:
        url: ""
        baseDn: ""
        bindDn: ""
        bindPassword: ""
        userSearchFilter: ""
        domain: ""

    tls:
      enabled: false
      truststore:
        enabled: false
        format: jks    # jks | pem
        truststoreSecret: ""
        truststoreKey: truststore.jks
        pemKey: ca.crt
        truststorePasswordKey: truststore.password
        mountPath: /etc/security/truststore/truststore.jks
        # Optional env var names exported to the JVM when truststore is mounted.
        # These defaults are also used when the Ambari Global Security Profile does not specify custom names.
        env:
          pathEnv: TRUSTSTORE_PATH
          passwordEnv: TRUSTSTORE_PASSWORD

  vault:
    enabled: false
    address: ""
    namespace: ""
    auth:
      method: kubernetes   # kubernetes | approle
      mountPath: kubernetes
      kubernetes:
        role: ""
      approle:
        roleId: ""
        secretId: ""
    csi:
      caCertSecret: ""

vault:
  csi:
    enabled: false
    mountPath: /vault/secrets
    secretProviderClassName: ""
    readOnly: true
    objects: ""  # multiline string for SecretProviderClass parameters.objects


accessControl:
  # 'configmap' keeps your current behavior; set to 'ranger' to enable Ranger integration
  type: configmap # configmap | ranger - can be controlled by ambari's charts.json with dynamicValues

## Clemlab edit from ambari
## hadoopConf and ranger sections added for ranger integration are normalized and can be used in other
## charts as well.
# =========================
# Hadoop client configuration (independent of Ranger)
# =========================
hadoopConf:
  enabled: false
  # Ambari View will create this ConfigMap if enabled, with keys: core-site.xml, hdfs-site.xml
  configMapName: trino-hadoop-conf
  # (Optional) you could use a Secret instead (mutually exclusive with configMapName)
  # secretName: trino-hadoop-conf-secret
  mountPath: /etc/hadoop/conf
  setEnv: true  # export HADOOP_CONF_DIR=/etc/hadoop/conf

  # ------------------------------------------------------------------
  # Hadoop LdapGroupsMapping overlay
  # ------------------------------------------------------------------
  # When enabled, an init container appends LdapGroupsMapping properties
  # to core-site.xml at pod startup so Ranger's plugin can resolve user
  # groups against an LDAP/FreeIPA directory.  Required for Trino because
  # the upstream container image doesn't ship SSSD/nslcd, so the default
  # ShellBasedUnixGroupsMapping returns no groups for OIDC-authenticated
  # users (everything appears as "no groups" → group-based Ranger
  # policies never match).
  #
  # The original Hadoop ConfigMap (set above) provides the read-only
  # base; this overlay layers LdapGroupsMapping on top into a writable
  # /etc/hadoop/conf served from an emptyDir volume.
  groupMapping:
    enabled: false
    ldap:
      # LDAP/IPA server endpoint. For TLS use ldaps://...:636 and provide
      # a CA bundle via the existing truststore mount.
      url: ""
      # Bind user — IPA hides memberOf from anonymous reads, so an
      # authenticated bind is required.  Read-only IPA service account
      # is recommended over reusing the admin user.
      bindUser: ""
      # Bind password sourced from a Kubernetes Secret to keep it out of
      # values.yaml. The chart mounts <secretName>:<key> to a file and
      # passes its path to Hadoop via
      # hadoop.security.group.mapping.ldap.bind.password.file.
      bindPasswordSecret:
        name: ""
        key: "password"
      # Common LDAP search settings — defaults below match FreeIPA's
      # accounts subtree.
      baseDn: ""
      userSearchFilter: "(&(objectClass=person)(uid={0}))"
      groupSearchFilter: "(objectClass=posixGroup)"
      memberAttr: "member"           # IPA stores membership in `member`
      groupNameAttr: "cn"
      # Caching — avoid hammering LDAP on every Ranger access decision.
      cacheSeconds: 300
      negativeCacheSeconds: 30
      readTimeoutMs: 10000
      connectionTimeoutMs: 5000

# =========================
# Ranger integration (coordinator-only)
# =========================
ranger:
  # Name of the Ranger repository to create/use
  # All files in one ConfigMap created by Ambari View backend:
  #   - ranger-trino-security.xml
  #   - (optional) ranger-policymgr-ssl.xml  ← if you prefer keeping SSL XML separate, see below
  policyCacheDir: /opt/trino/data/ranger-trino-plugin/cache
  policymgrssl_path: /etc/trino/ranger/ranger-policymgr-ssl-trino.xml
  auditConfigMapName: ranger-trino-audit
  securityConfigMapName: ranger-trino-plugin-properties
  # If you keep SSL XML separate from security XML, uncomment and use this instead:
  # sslConfigMapName: trino-ranger-ssl
  cred:
    secretName: ranger-trino-plugin-credential-provider
    providerPath: /etc/trino/ranger/cred
    providerFile: cred.jceks
  admin:
    ssl:
      enabled: true
      truststore:
        secretName: ranger-admin-truststore     # Ambari-created Secret
        fileKey: ranger.truststore.jks          # data key in Secret
        type: jks
        # If you want the container env var for password (optional)
        passwordSecretName: ranger-admin-ts-pass
        passwordKey: password
      mtls:
        enabled: false
        secretName: trino-to-ranger-client      # optional client cert/key secret
        certKey: tls.crt
        keyKey: tls.key

server:
  workers: 2
  node:
    # server.node.environment -- Supports templating with `tpl`.
    environment: production
    dataDir: /data/trino
    pluginDir: /usr/lib/trino/plugin
  log:
    trino:
      level: INFO
  config:
    path: /etc/trino
    https:
      enabled: false
      port: 8443
      keystore:
        path: ""
        secretName: ""        # Secret containing the HTTPS keystore (optional; when set, keystore is mounted from Secret)
        key: keystore.p12     # Data key inside the keystore Secret
        mountPath: /etc/trino/https-keystore.p12
        passwordSecretName: "" # Secret containing the keystore password (optional)
        passwordKey: truststore.password  # Data key inside the password Secret
        passwordMountPath: /etc/trino/https-pass/password # File path where the password will be mounted
      # -- Trino supports multiple [authentication
      # types](https://trino.io/docs/current/security/authentication-types.html):
      # PASSWORD, CERTIFICATE, OAUTH2, JWT, KERBEROS.
    query:
      maxMemory: "4GB"
    authenticationType: ""
  exchangeManager: {}
  # server.exchangeManager -- Mandatory [exchange manager
  # configuration](https://trino.io/docs/current/admin/fault-tolerant-execution.html#id1).
  # Used to set the name and location(s) of spooling data storage. For multiple destinations use a list or a comma separated URI locations.
  # To enable fault-tolerant execution, set the `retry-policy` property in `additionalConfigProperties`.
  # Additional exchange manager configurations can be added to `additionalExchangeManagerProperties`.
  # @raw
  # Example:
  # ```yaml
  # server:
  #   exchangeManager:
  #     name: "filesystem"
  #     baseDir:
  #       - "/tmp/trino-local-file-system-exchange-manager"
  # additionalConfigProperties:
  #   - retry-policy=TASK
  # additionalExchangeManagerProperties:
  #   - exchange.sink-buffer-pool-min-size=10
  #   - exchange.sink-buffers-per-partition=2
  #   - exchange.source-concurrent-readers=4
  # ```

  workerExtraConfig: ""
  coordinatorExtraConfig: ""
  # server.autoscaling -- Configure [Horizontal Pod Autoscaling](https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/)
  # for workers (`server.keda.enabled` must be `false`).
  autoscaling:
    enabled: false
    maxReplicas: 5
    # -- Target average CPU utilization, represented as a percentage of requested CPU. To disable scaling based on CPU,
    # set to an empty string.
    targetCPUUtilizationPercentage: 50
    # -- Target average memory utilization, represented as a percentage of requested memory. To disable scaling
    # based on memory, set to an empty string.
    targetMemoryUtilizationPercentage: 80
    behavior: {}
    # server.autoscaling.behavior -- Configuration for scaling up and down.
    # @raw
    # Example:
    # ```yaml
    #  scaleDown:
    #    stabilizationWindowSeconds: 300
    #    policies:
    #    - type: Percent
    #      value: 100
    #      periodSeconds: 15
    #  scaleUp:
    #    stabilizationWindowSeconds: 0
    #    policies:
    #    - type: Percent
    #      value: 100
    #      periodSeconds: 15
    #    - type: Pods
    #      value: 4
    #      periodSeconds: 15
    #    selectPolicy: Max
    # ```

  # server.keda -- Configure [Kubernetes Event-driven Autoscaling](https://keda.sh/) for workers
  # (`server.autoscaling.enabled` must be `false`).
  keda:
    enabled: false
    pollingInterval: 30
    # -- Period (in seconds) to wait after the last trigger reported active before scaling the resource back to 0
    cooldownPeriod: 300
    # -- The delay (in seconds) before the `cooldownPeriod` starts after the initial creation of the `ScaledObject`.
    initialCooldownPeriod: 0
    # -- Minimum number of replicas KEDA will scale the resource down to.
    # By default, it’s scale to zero, but you can use it with some other value as well.
    minReplicaCount: 0
    # -- This setting is passed to the HPA definition that KEDA will create for a given resource and
    # holds the maximum number of replicas of the target resource.
    maxReplicaCount: 5
    fallback: {}
    # server.keda.fallback -- Defines a number of replicas to fall back to if a scaler is in an error state.
    # @raw
    # Example:
    # ```yaml
    # fallback:             # Optional. Section to specify fallback options
    #   failureThreshold: 3 # Mandatory if fallback section is included
    #   replicas: 6         # Mandatory if fallback section is included
    # ```
    advanced: {}
    # server.keda.advanced -- Specifies HPA related options
    # @raw
    # Example:
    # ```yaml
    # advanced:
    #   horizontalPodAutoscalerConfig:
    #     behavior:
    #       scaleDown:
    #         stabilizationWindowSeconds: 300
    #         policies:
    #           - type: Percent
    #             value: 100
    #             periodSeconds: 15
    # ```
    triggers: []
    # server.keda.triggers -- List of triggers to activate scaling of the target resource
    # @raw
    # Example:
    # ```yaml
    # triggers:
    #   - type: prometheus
    #     metricType: Value
    #     metadata:
    #       serverAddress: "http://prometheus.example.com"
    #       threshold: "1"
    #       metricName: required_workers
    #       query: >-
    #         sum by (service)
    #         (avg_over_time(trino_execution_ClusterSizeMonitor_RequiredWorkers{service={{ include "trino.fullname" . | quote }}}[5s]))
    # ```
    annotations: {}
    # server.keda.annotations -- Annotations to apply to the ScaledObject CRD.
    # @raw
    # Example:
    # ```yaml
    # annotations:
    #   autoscaling.keda.sh/paused-replicas: "0"
    #   autoscaling.keda.sh/paused: "true"
    # ```

accessControl: {}
# accessControl -- [System access
# control](https://trino.io/docs/current/security/built-in-system-access-control.html)
# configuration.
# @raw
# Set the type property to either:
# * `configmap`, and provide the rule file contents in `rules`,
# * `properties`, and provide configuration properties in `properties`.
# Properties example:
# ```yaml
# type: properties
# properties: |
#     access-control.name=custom-access-control
#     access-control.custom_key=custom_value
# ```
# Config map example:
# ```yaml
#  type: configmap
#  refreshPeriod: 60s
#  # Rules file is mounted to /etc/trino/access-control
#  configFile: "rules.json"
#  rules:
#    rules.json: |-
#      {
#        "catalogs": [
#          {
#            "user": "admin",
#            "catalog": "(mysql|system)",
#            "allow": "all"
#          },
#          {
#            "group": "finance|human_resources",
#            "catalog": "postgres",
#            "allow": true
#          },
#          {
#            "catalog": "hive",
#            "allow": "all"
#          },
#          {
#            "user": "alice",
#            "catalog": "postgresql",
#            "allow": "read-only"
#          },
#          {
#            "catalog": "system",
#            "allow": "none"
#          }
#        ],
#        "schemas": [
#          {
#            "user": "admin",
#            "schema": ".*",
#            "owner": true
#          },
#          {
#            "user": "guest",
#            "owner": false
#          },
#          {
#            "catalog": "default",
#            "schema": "default",
#            "owner": true
#          }
#        ]
#      }
# ```

resourceGroups: {}
# resourceGroups -- [Resource groups control](https://trino.io/docs/current/admin/resource-groups.html)
