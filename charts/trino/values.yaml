# catalogs -- Configure
# [catalogs](https://trino.io/docs/current/installation/deployment.html#catalog-properties).
# @raw
# Example:
# ```yaml
#  objectstore: |
#    connector.name=iceberg
#    iceberg.catalog.type=glue
