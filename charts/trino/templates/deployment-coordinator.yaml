{{- $coordinatorJmx := merge .Values.jmx.coordinator (omit .Values.jmx "coordinator" "worker") -}}
{{- $rangerEnabled := eq (include "trino.ranger.enabled" .) "true" -}}
{{- $kerb := .Values.global.security.kerberos | default dict -}}
{{- $kerbMode := (default "WEBHOOK" $kerb.injectionMode) | upper -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "trino.coordinator" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trino.labels" . | nindent 4 }}
    app.kubernetes.io/component: coordinator
    trino.io/network-policy-protection: {{ ternary "enabled" "disabled" .Values.networkPolicy.enabled }}
    {{- if .Values.coordinator.labels }}
    {{- tpl (toYaml .Values.coordinator.labels) . | nindent 4 }}
    {{- end }}
  annotations:
    {{- toYaml .Values.coordinator.deployment.annotations | nindent 4 }}
spec:
  replicas: 1
  progressDeadlineSeconds: {{ .Values.coordinator.deployment.progressDeadlineSeconds }}
  revisionHistoryLimit: {{ .Values.coordinator.deployment.revisionHistoryLimit }}
  {{- if .Values.coordinator.deployment.strategy }}
  strategy:
    {{- toYaml .Values.coordinator.deployment.strategy | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "trino.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if and (eq .Values.accessControl.type "configmap") (not .Values.accessControl.refreshPeriod) }}
        checksum/access-control-config: {{ include (print $.Template.BasePath "/configmap-access-control-coordinator.yaml") . | sha256sum }}
        {{- end }}
        {{- if or .Values.catalogs .Values.additionalCatalogs .Values.coordinator.additionalCatalogs }}
        checksum/catalog-config: {{ include (print $.Template.BasePath "/configmap-catalog.yaml") . | sha256sum }}
        {{- end }}
        checksum/coordinator-config: {{ include (print $.Template.BasePath "/configmap-coordinator.yaml") . | sha256sum }}
      {{- if .Values.coordinator.annotations }}
      {{- tpl (toYaml .Values.coordinator.annotations) . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "trino.labels" . | nindent 8 }}
        app.kubernetes.io/component: coordinator
        trino.io/network-policy-protection: {{ ternary "enabled" "disabled" .Values.networkPolicy.enabled }}
        {{- if eq $kerbMode "WEBHOOK" }}
        security.clemlab.com/needs-keytab: "true"
        security.clemlab.com/service: trino-coordinator
        {{- end }}
        {{- if .Values.coordinator.labels }}
        {{- tpl (toYaml .Values.coordinator.labels) . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "trino.serviceAccountName" . }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.shareProcessNamespace.coordinator }}
      shareProcessNamespace: {{ .Values.shareProcessNamespace.coordinator }}
      {{- end }}
      volumes:
        - name: config-volume
          {{- if and .Values.server.config.https.keystore.secretName .Values.server.config.https.keystore.passwordSecretName .Values.server.config.https.enabled }}
          emptyDir: {}
          {{- else }}
          configMap:
            name: {{ template "trino.coordinator" . }}
          {{- end }}
        {{- if or .Values.catalogs .Values.additionalCatalogs .Values.coordinator.additionalCatalogs }}
        - name: catalog-volume
          configMap:
            name: {{ template "trino.catalog.coordinator" . }}
        {{- end }}
        - name: schemas-volume
          configMap:
            name: {{ template "trino.fullname" . }}-schemas-volume-coordinator
        {{- if eq .Values.accessControl.type "configmap" }}
        - name: access-control-volume
          configMap:
            name: {{ template "trino.fullname" . }}-access-control-volume-coordinator
        {{- end }}
        {{- if eq .Values.resourceGroups.type "configmap" }}
        - name: resource-groups-volume
          configMap:
            name: {{ template "trino.fullname" . }}-resource-groups-volume-coordinator
        {{- end }}
        {{- if or .Values.auth.passwordAuth .Values.auth.passwordAuthSecret }}
        - name: file-password-authentication-volume
          secret:
            secretName: {{ template "trino.passwordSecretName" . }}
            items:
              - key: password.db
                path: password.db
        {{- end }}
        {{- if or .Values.auth.groups .Values.auth.groupsAuthSecret }}
        - name: file-groups-authentication-volume
          secret:
            secretName: {{ template "trino.groupsSecretName" . }}
            items:
              - key: group.db
                path: group.db
        {{- end }}
        {{- if $coordinatorJmx.exporter.enabled }}
        - name: jmx-exporter-config-volume
          configMap:
            name: {{ template "trino.fullname" . }}-jmx-exporter-config-coordinator
        {{- end }}
        {{- range .Values.configMounts }}
        - name: {{ .name }}
          configMap:
            name: {{ tpl .configMap $ }}
        {{- end }}
        {{- range .Values.coordinator.configMounts }}
        - name: {{ .name }}
          configMap:
            name: {{ tpl .configMap $ }}
        {{- end }}
        {{- range .Values.secretMounts }}
        - name: {{ .name }}
          secret:
            secretName: {{ tpl .secretName $ }}
        {{- end }}
        {{- range .Values.coordinator.secretMounts }}
        - name: {{ .name }}
          secret:
            secretName: {{ tpl .secretName $ }}
        {{- end }}
        {{- if and .Values.server.config.https.keystore.secretName .Values.server.config.https.keystore.passwordSecretName .Values.server.config.https.enabled }}
        - name: https-keystore
          secret:
            secretName: {{ .Values.server.config.https.keystore.secretName }}
            items:
              - key: {{ .Values.server.config.https.keystore.key | default "keystore.p12" }}
                path: https-keystore
        - name: https-keystore-pass
          secret:
            secretName: {{ .Values.server.config.https.keystore.passwordSecretName }}
            items:
              - key: {{ .Values.server.config.https.keystore.passwordKey | default "password" }}
                path: password
        - name: configmap-original
          configMap:
            name: {{ template "trino.coordinator" . }}
        {{- end }}
        {{- if $rangerEnabled }}
        - name: ranger-dir
          emptyDir: {}
        {{- if .Values.ranger.policyCacheDir }}
        - name: ranger-policy-cache
          emptyDir: {}
        {{- end }}
        {{- end }}
        # ---------- Ranger plugin files ----------
        {{- if $rangerEnabled }}
        - name: ranger-cred
          secret:
            secretName: {{ .Values.ranger.cred.secretName }}   # e.g. trino-ranger-cred
            items:
              - key: {{ .Values.ranger.cred.providerFile }}
                path: {{ .Values.ranger.cred.providerFile }}
        - name: ranger-security
          configMap:
            # contains: ranger-trino-security.xml
            name: {{ required "ranger.securityConfigMapName is required when accessControl.type=ranger" .Values.ranger.securityConfigMapName }}
        - name: ranger-audit
          configMap:
            # contains: ranger-trino-audit.xml
            name: {{ required "ranger.auditConfigMapName is required when accessControl.type=ranger" .Values.ranger.auditConfigMapName }}
        {{- if .Values.ranger.admin.ssl.enabled }}
        - name: ranger-ssl
          configMap:
            # contains: ranger-policymgrssl-trino.xml
            name: {{ required "ranger.policymgrSslConfigMapName is required when ranger.admin.ssl.enabled" .Values.ranger.policymgrSslConfigMapName }}
        - name: ranger-truststore
          secret:
            # contains truststore binary under key: .Values.ranger.admin.ssl.truststore.fileKey
            secretName: {{ required "ranger.admin.ssl.truststore.secretName is required when ranger.admin.ssl.enabled" .Values.ranger.admin.ssl.truststore.secretName }}
        {{- if .Values.ranger.admin.ssl.mtls.enabled }}
        - name: ranger-mtls
          secret:
            secretName: {{ required "ranger.admin.ssl.mtls.secretName is required when ranger.admin.ssl.mtls.enabled" .Values.ranger.admin.ssl.mtls.secretName }}
        {{- end }}
        {{- end }}
        {{- end }}
        # ---------- Hadoop configs (core-site.xml / hdfs-site.xml) ----------
        {{- if eq (include "trino.hadoopConf.groupMapping.enabled" .) "true" }}
        # groupMapping overlay enabled: original is mounted to /original via init,
        # merged copy is what the main container reads at hadoopConf.mountPath.
        {{- include "trino.hadoopConf.groupMapping.volumes" . | nindent 8 }}
        {{- else }}
        {{- if and .Values.hadoopConf.enabled .Values.hadoopConf.configMapName }}
        - name: hadoop-conf
          configMap:
            name: {{ .Values.hadoopConf.configMapName }}
        {{- end }}
        {{- if and .Values.hadoopConf.enabled .Values.hadoopConf.secretName }}
        - name: hadoop-conf
          secret:
            secretName: {{ .Values.hadoopConf.secretName }}
        {{- end }}
        {{- end }}
        {{ include "trino.truststore.volume" . | nindent 8 }}
        {{ include "trino.vault.volume" . | nindent 8 }}
        {{- with .Values.coordinator.additionalVolumes }}
        {{- tpl (. | toYaml) $ | nindent 8 }}
        {{- end }}
        {{- if and .Values.global.security.kerberos.enabled .Values.global.security.kerberos.configMapName }}
        - name: krb5-conf
          configMap:
            name: {{ .Values.global.security.kerberos.configMapName }}
            {{- if .Values.global.security.kerberos.key }}
            items:
              - key: {{ .Values.global.security.kerberos.key }}
                path: krb5.conf
            {{- end }}
        {{- end }}
        {{- if and .Values.global.security.kerberos.enabled $kerb.keytab.secretName }}
        - name: keytab-secret
          secret:
            secretName: {{ $kerb.keytab.secretName }}
            items:
              - key: {{ default "service.keytab" $kerb.keytab.secretDataKey }}
                path: {{ default "service.keytab" $kerb.keytab.secretDataKey }}
        {{- end }}
      {{- if or .Values.initContainers.coordinator (and .Values.server.config.https.keystore.secretName .Values.server.config.https.keystore.passwordSecretName .Values.server.config.https.enabled) (eq (include "trino.hadoopConf.groupMapping.enabled" .) "true") }}
      initContainers:
      {{- if $rangerEnabled }}
        - name: init-ranger-dirs
          image: {{ include "trino.busybox.image" (dict "root" .) }}
          imagePullPolicy: {{ default "IfNotPresent" .Values.busyboxImage.pullPolicy }}
          command: ["sh","-c","mkdir -p /etc/trino/ranger/ssl"]
          volumeMounts:
            - name: ranger-dir
              mountPath: /etc/trino/ranger
      {{- end }}
      {{- include "trino.hadoopConf.groupMapping.initContainer" . | nindent 8 }}
      {{- if and .Values.server.config.https.keystore.secretName .Values.server.config.https.keystore.passwordSecretName .Values.server.config.https.enabled }}
        - name: init-https-keystore
          image: {{ include "trino.busybox.image" (dict "root" .) }}
          imagePullPolicy: {{ default "IfNotPresent" .Values.busyboxImage.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /config-merged
              cp -a /configmap-original/. /config-merged/ || true
              if [ -f {{ .Values.server.config.https.keystore.passwordMountPath | default "/etc/trino/https-pass/password" }} ]; then
                echo "http-server.https.keystore.key=$(cat {{ .Values.server.config.https.keystore.passwordMountPath | default "/etc/trino/https-pass/password" }})" >> /config-merged/config.properties
              fi
          volumeMounts:
            - name: configmap-original
              mountPath: /configmap-original
            - name: config-volume
              mountPath: /config-merged
            - name: https-keystore-pass
              mountPath: {{ .Values.server.config.https.keystore.passwordMountPath | default "/etc/trino/https-pass/password" }}
              subPath: password
      {{- end }}
      {{- if .Values.initContainers.coordinator }}
      {{- tpl (toYaml .Values.initContainers.coordinator) . | nindent 6 }}
      {{- end }}
      {{- end }}
      {{- if .Values.imagePullSecrets}}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.coordinator.terminationGracePeriodSeconds }}
      containers:
        - name: {{ .Chart.Name }}-coordinator
          image: {{ include "trino.image" (dict "root" . "image" .Values.image) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            {{- include "trino.env" . | nindent 12 }}
            {{- include "trino.security.env" . | nindent 12 }}
          envFrom:
            {{- tpl (toYaml .Values.envFrom) . | nindent 12 }}
          volumeMounts:
            - mountPath: {{ .Values.server.config.path }}
              name: config-volume
            {{- if and .Values.server.config.https.keystore.secretName .Values.server.config.https.keystore.passwordSecretName .Values.server.config.https.enabled }}
            - name: https-keystore
              mountPath: {{ .Values.server.config.https.keystore.mountPath | default "/etc/trino/https-keystore.p12" }}
              subPath: https-keystore
              readOnly: true
            - name: https-keystore-pass
              mountPath: {{ .Values.server.config.https.keystore.passwordMountPath | default "/etc/trino/https-pass/password" }}
              subPath: password
              readOnly: true
            {{- end }}
            {{- if or .Values.catalogs .Values.additionalCatalogs .Values.coordinator.additionalCatalogs }}
            - mountPath: {{ .Values.server.config.path }}/catalog
              name: catalog-volume
            {{- end }}
            - mountPath: {{ .Values.kafka.mountPath }}
              name: schemas-volume
            {{- if eq .Values.accessControl.type "configmap" }}
            - mountPath: {{ .Values.server.config.path }}/access-control
              name: access-control-volume
            {{- end }}
            {{- if eq .Values.resourceGroups.type "configmap" }}
            - mountPath: {{ .Values.server.config.path }}/resource-groups
              name: resource-groups-volume
            {{- end }}
            {{- range .Values.configMounts }}
            - name: {{ .name }}
              mountPath: {{ .path }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
            {{- end }}
            {{- range .Values.coordinator.configMounts }}
            - name: {{ .name }}
              mountPath: {{ .path }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
            {{- end }}
            {{- range .Values.secretMounts }}
            - name: {{ .name }}
              mountPath: {{ .path }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
            {{- end }}
            {{- range .Values.coordinator.secretMounts }}
            - name: {{ .name }}
              mountPath: {{ .path }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
            {{- end }}
            {{- if or .Values.auth.passwordAuth .Values.auth.passwordAuthSecret }}
            - mountPath: {{ .Values.server.config.path }}/auth/password
              name: file-password-authentication-volume
            {{- end }}
            {{- if or .Values.auth.groups .Values.auth.groupsAuthSecret }}
            - mountPath: {{ .Values.server.config.path }}/auth/group
              name: file-groups-authentication-volume
            {{- end }}
                        # ---------- Ranger mounts ----------
            {{- if $rangerEnabled }}
            - name: ranger-dir
              mountPath: /etc/trino/ranger
            {{- if .Values.ranger.policyCacheDir }}
            - name: ranger-policy-cache
              mountPath: {{ .Values.ranger.policyCacheDir }}
            {{- end }}
            - name: ranger-cred
              mountPath: {{ .Values.ranger.cred.providerPath }}
              readOnly: true
            # ranger-trino-security.xml
            - name: ranger-security
              mountPath: /etc/trino/ranger/ranger-trino-security.xml
              subPath: ranger-trino-security.xml

            # ranger-trino-audit.xml
            - name: ranger-audit
              mountPath: /etc/trino/ranger/ranger-trino-audit.xml
              subPath: ranger-trino-audit.xml

            {{- if .Values.ranger.admin.ssl.enabled }}
            # ranger-policymgr-ssl-trino.xml
            - name: ranger-ssl
              mountPath: {{ .Values.ranger.policymgrssl_path }}
              subPath: ranger-policymgr-ssl-trino.xml

            # truststore binary (key provided by values.ranger.admin.ssl.truststore.fileKey)
            - name: ranger-truststore
              mountPath: /etc/trino/ranger/ssl/truststore.{{ default "jks" .Values.ranger.admin.ssl.truststore.type | lower }}
              subPath: {{ .Values.ranger.admin.ssl.truststore.fileKey }}

            {{- if .Values.ranger.admin.ssl.mtls.enabled }}
            # optional client mTLS
            - name: ranger-mtls
              mountPath: /etc/trino/ranger/ssl/tls.crt
              subPath: {{ .Values.ranger.admin.ssl.mtls.certKey }}
            - name: ranger-mtls
              mountPath: /etc/trino/ranger/ssl/tls.key
              subPath: {{ .Values.ranger.admin.ssl.mtls.keyKey }}
            {{- end }}
            {{- end }}
            {{- end }}

            # ---------- Hadoop conf mount ----------
            {{- if eq (include "trino.hadoopConf.groupMapping.enabled" .) "true" }}
            {{- include "trino.hadoopConf.groupMapping.volumeMounts" . | nindent 12 }}
            {{- else if and .Values.hadoopConf.enabled (or .Values.hadoopConf.configMapName .Values.hadoopConf.secretName) }}
            - name: hadoop-conf
              mountPath: {{ .Values.hadoopConf.mountPath | default "/etc/hadoop/conf" }}
            {{- end }}
            {{ include "trino.truststore.volumeMount" . | nindent 12 }}
            {{ include "trino.vault.volumeMount" . | nindent 12 }}
            ## ---------- Kerberos krb5.conf mount ----------
            {{- if and .Values.global.security.kerberos.enabled .Values.global.security.kerberos.configMapName }}
            - name: krb5-conf
              mountPath: {{ default "/etc/krb5.conf" .Values.global.security.kerberos.mountPath }}
              subPath: {{ default "krb5.conf" .Values.global.security.kerberos.key }}
              readOnly: true
            {{- end }}
            {{- if and .Values.global.security.kerberos.enabled $kerb.keytab.secretName }}
            # ---------- Kerberos keytab secret mount (pre-provisioned mode) ----------
            - name: keytab-secret
              mountPath: {{ default "/etc/security/keytabs" $kerb.keytab.mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.coordinator.additionalVolumeMounts }}
            {{- . | toYaml | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if .Values.server.config.https.enabled }}
            - name: https
              containerPort: {{ .Values.server.config.https.port }}
              protocol: TCP
            {{- end }}
            {{- if $coordinatorJmx.enabled }}
            - name: jmx-registry
              containerPort: {{ $coordinatorJmx.registryPort }}
              protocol: TCP
            - name: jmx-server
              containerPort: {{ $coordinatorJmx.serverPort }}
              protocol: TCP
            {{- end }}
          {{- range $key, $value := .Values.coordinator.additionalExposedPorts }}
            - name: {{ $value.name }}
              containerPort: {{ $value.port }}
              protocol: {{ $value.protocol }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /v1/info
              port: http
            initialDelaySeconds: {{ .Values.coordinator.livenessProbe.initialDelaySeconds | default 30 }}
            periodSeconds: {{ .Values.coordinator.livenessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.coordinator.livenessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.coordinator.livenessProbe.failureThreshold | default 6 }}
            successThreshold: {{ .Values.coordinator.livenessProbe.successThreshold | default 1 }}
          readinessProbe:
            exec:
              command: [/usr/lib/trino/bin/health-check]
            initialDelaySeconds: {{ .Values.coordinator.readinessProbe.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.coordinator.readinessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.coordinator.readinessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.coordinator.readinessProbe.failureThreshold | default 6 }}
            successThreshold: {{ .Values.coordinator.readinessProbe.successThreshold | default 1 }}
          lifecycle:
            {{- tpl (toYaml .Values.coordinator.lifecycle) . | nindent 12 }}
          resources:
            {{- toYaml .Values.coordinator.resources | nindent 12 }}
      {{- if $coordinatorJmx.exporter.enabled }}
        - name: jmx-exporter
          image: {{ $coordinatorJmx.exporter.image }}
          imagePullPolicy: {{ $coordinatorJmx.exporter.pullPolicy }}
          securityContext:
            {{- toYaml $coordinatorJmx.exporter.securityContext | nindent 12 }}
          args:
            - "{{ $coordinatorJmx.exporter.port }}"
            - /etc/jmx-exporter/jmx-exporter-config.yaml
          volumeMounts:
            - mountPath: /etc/jmx-exporter/
              name: jmx-exporter-config-volume
          resources:
            {{- toYaml $coordinatorJmx.exporter.resources | nindent 12 }}
          ports:
            - name: jmx-exporter
              containerPort: {{ $coordinatorJmx.exporter.port }}
              protocol: TCP
      {{- end }}
      {{- if .Values.sidecarContainers.coordinator }}
        {{- toYaml .Values.sidecarContainers.coordinator | nindent 8 }}
      {{- end }}
      {{- with .Values.coordinator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.coordinator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.coordinator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
