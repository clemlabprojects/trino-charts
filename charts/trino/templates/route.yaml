{{- /* OpenShift Route — emitted only on OpenShift when ingress.enabled AND route.enabled. Replaces Ingress (ingress.yaml suppresses itself under the same condition). */ -}}
{{- if and .Values.ingress.enabled .Values.route.enabled (.Capabilities.APIVersions.Has "route.openshift.io/v1") }}
{{- $https := .Values.server.config.https.enabled }}
{{- $host := (first .Values.ingress.hosts).host }}
{{- $path := (first (first .Values.ingress.hosts).paths).path | default "/" }}
{{- $tlsSecret := "" }}
{{- if .Values.ingress.tls }}{{- $tlsSecret = (tpl (first .Values.ingress.tls).secretName $) }}{{- end }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ template "trino.coordinator" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trino.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  host: {{ $host | quote }}
  {{- /* passthrough routes cannot carry a path (the router can't read it without terminating TLS) */}}
  {{- if not $https }}
  path: {{ $path | quote }}
  {{- end }}
  to:
    kind: Service
    name: {{ include "trino.fullname" . }}
    weight: 100
  {{- if $https }}
  port:
    targetPort: {{ .Values.server.config.https.port }}
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: Redirect
  {{- else }}
  port:
    targetPort: {{ .Values.service.port }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
    {{- if $tlsSecret }}
    {{- $sec := lookup "v1" "Secret" .Release.Namespace $tlsSecret }}
    {{- if $sec }}
    certificate: |-
      {{- index $sec.data "tls.crt" | b64dec | nindent 6 }}
    key: |-
      {{- index $sec.data "tls.key" | b64dec | nindent 6 }}
    {{- end }}
    {{- end }}
  {{- end }}
  wildcardPolicy: None
{{- end }}
