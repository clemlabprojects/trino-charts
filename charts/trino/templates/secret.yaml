{{- $authMode := ((.Values.global).security).auth | default dict | dig "mode" "" -}}
{{- if ne $authMode "" -}}
{{- $secretName := printf "%s-internal-communication" (include "trino.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $sharedSecret := "" -}}
{{- if $existing -}}
  {{- $sharedSecret = index $existing.data "shared-secret" | b64dec -}}
{{- else -}}
  {{- $sharedSecret = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trino.labels" . | nindent 4 }}
type: Opaque
data:
  shared-secret: {{ $sharedSecret | b64enc }}
---
{{- end -}}
{{- if and (not .Values.auth.passwordAuthSecret) .Values.auth.passwordAuth }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "trino.passwordSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trino.labels" . | nindent 4 }}
data:
{{- if .Values.auth.passwordAuth }}
  password.db: {{ .Values.auth.passwordAuth | b64enc }}
{{- end }}
{{- end }}
---
{{- if and (not .Values.auth.groupsAuthSecret) .Values.auth.groups }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "trino.groupsSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trino.labels" . | nindent 4 }}
data:
{{- if .Values.auth.groups}}
  group.db: {{ .Values.auth.groups | b64enc }}
{{- end }}
{{- end }}
