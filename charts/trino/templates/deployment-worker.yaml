{{- $workerJmx := merge .Values.jmx.worker (omit .Values.jmx "coordinator" "worker") -}}
{{- $rangerEnabled := eq (include "trino.ranger.enabled" .) "true" -}}
{{- $kerb := .Values.global.security.kerberos | default dict -}}
{{- $kerbMode := (default "WEBHOOK" $kerb.injectionMode) | upper -}}
{{- $coordinatorKeytab := $kerb.keytab | default dict -}}
{{- $workerKeytab := $kerb.workerKeytab | default dict -}}
{{- $workerKeytabSecretName := default $coordinatorKeytab.secretName $workerKeytab.secretName -}}
{{- $workerKeytabSecretDataKey := default $coordinatorKeytab.secretDataKey $workerKeytab.secretDataKey -}}
{{- $workerKeytabMountPath := default $coordinatorKeytab.mountPath $workerKeytab.mountPath -}}
{{- if or .Values.server.keda.enabled (gt (int .Values.server.workers) 0) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "trino.worker" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trino.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
    trino.io/network-policy-protection: {{ ternary "enabled" "disabled" .Values.networkPolicy.enabled }}
    {{- if .Values.worker.labels }}
    {{- tpl (toYaml .Values.worker.labels) . | nindent 4 }}
    {{- end }}
  annotations:
    {{- toYaml .Values.worker.deployment.annotations | nindent 4 }}
spec:
  progressDeadlineSeconds: {{ .Values.worker.deployment.progressDeadlineSeconds }}
  revisionHistoryLimit: {{ .Values.worker.deployment.revisionHistoryLimit }}
  {{- if .Values.worker.deployment.strategy }}
  strategy:
    {{- toYaml .Values.worker.deployment.strategy | nindent 4 }}
  {{- end }}
  {{- if and (not .Values.server.autoscaling.enabled) (not .Values.server.keda.enabled) }}
  replicas: {{ .Values.server.workers }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "trino.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      annotations:
        {{- if or .Values.catalogs .Values.additionalCatalogs .Values.worker.additionalCatalogs }}
        checksum/catalog-config: {{ include (print $.Template.BasePath "/configmap-catalog.yaml") . | sha256sum }}
        {{- end }}
        checksum/worker-config: {{ include (print $.Template.BasePath "/configmap-worker.yaml") . | sha256sum }}
        {{- if .Values.worker.gracefulShutdown.enabled }}
        checksum/access-control-config: {{ include (print $.Template.BasePath "/configmap-access-control-worker.yaml") . | sha256sum }}
        {{- end }}
      {{- if .Values.worker.annotations }}
      {{- tpl (toYaml .Values.worker.annotations) . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "trino.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
        {{- if eq $kerbMode "WEBHOOK" }}
        security.clemlab.com/needs-keytab: "true"
        security.clemlab.com/service: trino-worker
        {{- end }}
        # security.clemlab.com/service: {{ template "trino.fullname" . }}-worker
        trino.io/network-policy-protection: {{ ternary "enabled" "disabled" .Values.networkPolicy.enabled }}
        {{- if .Values.worker.labels }}
        {{- tpl (toYaml .Values.worker.labels) . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "trino.serviceAccountName" . }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.shareProcessNamespace.worker }}
      shareProcessNamespace: {{ .Values.shareProcessNamespace.worker }}
      {{- end }}
      volumes:
        - name: config-volume
          {{- if and .Values.server.config.https.keystore.secretName .Values.server.config.https.keystore.passwordSecretName .Values.server.config.https.enabled }}
          emptyDir: {}
          {{- else }}
          configMap:
            name: {{ template "trino.worker" . }}
          {{- end }}
        {{- if or .Values.catalogs .Values.additionalCatalogs .Values.worker.additionalCatalogs }}
        - name: catalog-volume
          configMap:
            name: {{ template "trino.catalog.worker" . }}
        {{- end }}
        - name: schemas-volume
          configMap:
            name: {{ template "trino.fullname" . }}-schemas-volume-worker
        {{- if $workerJmx.exporter.enabled }}
        - name: jmx-exporter-config-volume
          configMap:
            name: {{ template "trino.fullname" . }}-jmx-exporter-config-worker
        {{- end }}
        {{- if .Values.worker.gracefulShutdown.enabled }}
        - name: access-control-volume
          configMap:
            name: {{ template "trino.fullname" . }}-access-control-volume-worker
        {{- end }}
        {{- range .Values.configMounts }}
        - name: {{ .name }}
          configMap:
            name: {{ tpl .configMap $ }}
        {{- end }}
        {{- range .Values.worker.configMounts }}
        - name: {{ .name }}
          configMap:
            name: {{ tpl .configMap $ }}
        {{- end }}
        {{- range .Values.secretMounts }}
        - name: {{ .name }}
          secret:
            secretName: {{ tpl .secretName $ }}
        {{- end }}
        {{- range .Values.worker.secretMounts }}
        - name: {{ .name }}
          secret:
            secretName: {{ tpl .secretName $ }}
        {{- end }}

        # ---------- Hadoop configs (core-site.xml / hdfs-site.xml) ----------
        {{- if eq (include "trino.hadoopConf.groupMapping.enabled" .) "true" }}
        {{- include "trino.hadoopConf.groupMapping.volumes" . | nindent 8 }}
        {{- else if and .Values.hadoopConf.enabled .Values.hadoopConf.configMapName }}
        - name: hadoop-conf
          configMap:
            name: {{ .Values.hadoopConf.configMapName }}
        {{- end }}
        {{ include "trino.truststore.volume" . | nindent 8 }}
        {{ include "trino.vault.volume" . | nindent 8 }}
        {{- if and .Values.global.security.kerberos.enabled $workerKeytabSecretName }}
        - name: keytab-secret
          secret:
            secretName: {{ $workerKeytabSecretName }}
            items:
              - key: {{ default "service.keytab" $workerKeytabSecretDataKey }}
                path: {{ default "service.keytab" $workerKeytabSecretDataKey }}
        {{- end }}
        {{- if and .Values.server.config.https.keystore.secretName .Values.server.config.https.keystore.passwordSecretName .Values.server.config.https.enabled }}
        - name: https-keystore
          secret:
            secretName: {{ .Values.server.config.https.keystore.secretName }}
            items:
              - key: {{ .Values.server.config.https.keystore.key | default "keystore.p12" }}
                path: https-keystore
        - name: https-keystore-pass
          secret:
            secretName: {{ .Values.server.config.https.keystore.passwordSecretName }}
            items:
              - key: {{ .Values.server.config.https.keystore.passwordKey | default "password" }}
                path: password
        - name: configmap-original
          configMap:
            name: {{ template "trino.worker" . }}
        {{- end }}
        {{- with .Values.worker.additionalVolumes }}
        {{- tpl (. | toYaml) $ | nindent 8 }}
        {{- end }}
        {{- if and .Values.global.security.kerberos.enabled .Values.global.security.kerberos.configMapName }}
        - name: krb5-conf
          configMap:
            name: {{ .Values.global.security.kerberos.configMapName }}
            {{- if .Values.global.security.kerberos.key }}
            items:
              - key: {{ .Values.global.security.kerberos.key }}
                path: krb5.conf
            {{- end }}
      {{- end }}
      {{- $httpsInit := and .Values.server.config.https.keystore.secretName .Values.server.config.https.keystore.passwordSecretName .Values.server.config.https.enabled -}}
      {{- $groupMappingInit := eq (include "trino.hadoopConf.groupMapping.enabled" .) "true" -}}
      {{- if or .Values.initContainers.worker $httpsInit $groupMappingInit }}
      initContainers:
      {{- if .Values.initContainers.worker }}
      {{- tpl (toYaml .Values.initContainers.worker) . | nindent 6 }}
      {{- end }}
      {{- include "trino.hadoopConf.groupMapping.initContainer" . | nindent 8 }}
      {{- if $httpsInit }}
        - name: init-https-keystore
          image: {{ include "trino.busybox.image" (dict "root" .) }}
          imagePullPolicy: {{ default "IfNotPresent" .Values.busyboxImage.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /config-merged
              cp -a /configmap-original/. /config-merged/ || true
              # if [ -f {{ .Values.server.config.https.keystore.passwordMountPath | default "/etc/trino/https-pass/password" }} ]; then
              #   echo "http-server.https.keystore.key=$(cat {{ .Values.server.config.https.keystore.passwordMountPath | default "/etc/trino/https-pass/password" }})" >> /config-merged/config.properties
              # fi
          volumeMounts:
            - name: configmap-original
              mountPath: /configmap-original
            - name: config-volume
              mountPath: /config-merged
            - name: https-keystore-pass
              mountPath: {{ .Values.server.config.https.keystore.passwordMountPath | default "/etc/trino/https-pass/password" }}
              subPath: password
      {{- end }}
      {{- end }}
      {{- if .Values.imagePullSecrets}}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if and .Values.worker.gracefulShutdown.enabled (gt (mulf 2.0 .Values.worker.gracefulShutdown.gracePeriodSeconds) .Values.worker.terminationGracePeriodSeconds) }}
      {{- fail "The user must set the `worker.terminationGracePeriodSeconds` to a value of at least two times the configured `gracePeriodSeconds`." }}
      {{- else }}
      terminationGracePeriodSeconds: {{ .Values.worker.terminationGracePeriodSeconds }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}-worker
          image: {{ include "trino.image" (dict "root" . "image" .Values.image) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            {{- include "trino.env" . | nindent 12 }}
            {{- include "trino.security.env" . | nindent 12 }}
          envFrom:
            {{- tpl (toYaml .Values.envFrom) . | nindent 12 }}
          volumeMounts:
            - mountPath: {{ .Values.server.config.path }}
              name: config-volume
            {{- if and .Values.server.config.https.keystore.secretName .Values.server.config.https.keystore.passwordSecretName .Values.server.config.https.enabled }}
            - name: https-keystore
              mountPath: {{ .Values.server.config.https.keystore.mountPath | default "/etc/trino/https-keystore.p12" }}
              subPath: https-keystore
              readOnly: true
            - name: https-keystore-pass
              mountPath: {{ .Values.server.config.https.keystore.passwordMountPath | default "/etc/trino/https-pass/password" }}
              subPath: password
              readOnly: true
            {{- end }}
            {{- if and .Values.global.security.kerberos.enabled $workerKeytabSecretName }}
            # ---------- Kerberos keytab secret mount (pre-provisioned mode) ----------
            - name: keytab-secret
              mountPath: {{ default "/etc/security/keytabs" $workerKeytabMountPath }}
              readOnly: true
            {{- end }}
            {{- if or .Values.catalogs .Values.additionalCatalogs .Values.worker.additionalCatalogs }}
            - mountPath: {{ .Values.server.config.path }}/catalog
              name: catalog-volume
            {{- end }}
            - mountPath: {{ .Values.kafka.mountPath }}
              name: schemas-volume
            {{- if .Values.worker.gracefulShutdown.enabled }}
            - mountPath: {{ .Values.server.config.path }}/access-control
              name: access-control-volume
            {{- end }}
            {{- range .Values.configMounts }}
            - name: {{ .name }}
              mountPath: {{ .path }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
            {{- end }}
            {{- range .Values.worker.configMounts }}
            - name: {{ .name }}
              mountPath: {{ .path }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
            {{- end }}
            {{- range .Values.secretMounts }}
            - name: {{ .name }}
              mountPath: {{ .path }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
            {{- end }}
            {{- range .Values.worker.secretMounts }}
            - name: {{ .name }}
              mountPath: {{ .path }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
            {{- end }}

            # ---------- Hadoop conf mount ----------
            {{- if eq (include "trino.hadoopConf.groupMapping.enabled" .) "true" }}
            {{- include "trino.hadoopConf.groupMapping.volumeMounts" . | nindent 12 }}
            {{- else if and .Values.hadoopConf.enabled (or .Values.hadoopConf.configMapName .Values.hadoopConf.secretName) }}
            - name: hadoop-conf
              mountPath: {{ .Values.hadoopConf.mountPath | default "/etc/hadoop/conf" }}
            {{- end }}
            {{ include "trino.truststore.volumeMount" . | nindent 12 }}
            {{ include "trino.vault.volumeMount" . | nindent 12 }}
            ## ---------- Kerberos krb5.conf mount ----------
            {{- if and .Values.global.security.kerberos.enabled .Values.global.security.kerberos.configMapName }}
            - name: krb5-conf
              mountPath: {{ default "/etc/krb5.conf" .Values.global.security.kerberos.mountPath }}
              subPath: {{ default "krb5.conf" .Values.global.security.kerberos.key }}
              readOnly: true
            {{- end }}

            {{- with .Values.worker.additionalVolumeMounts }}
            {{- . | toYaml | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if .Values.server.config.https.enabled }}
            - name: https
              containerPort: {{ .Values.server.config.https.port }}
              protocol: TCP
            {{- end }}
            {{- if $workerJmx.enabled }}
            - name: jmx-registry
              containerPort: {{ $workerJmx.registryPort }}
              protocol: TCP
            - name: jmx-server
              containerPort: {{ $workerJmx.serverPort }}
              protocol: TCP
            {{- end }}
          {{- range $key, $value := .Values.worker.additionalExposedPorts }}
            - name: {{ $value.name }}
              containerPort: {{ $value.port }}
              protocol: {{ $value.protocol }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /v1/info
              port: http
            initialDelaySeconds: {{ .Values.worker.livenessProbe.initialDelaySeconds | default 30 }}
            periodSeconds: {{ .Values.worker.livenessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.worker.livenessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.worker.livenessProbe.failureThreshold | default 6 }}
            successThreshold: {{ .Values.worker.livenessProbe.successThreshold | default 1 }}
          readinessProbe:
            exec:
              command: [/usr/lib/trino/bin/health-check]
            initialDelaySeconds: {{ .Values.worker.readinessProbe.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.worker.readinessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.worker.readinessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.worker.readinessProbe.failureThreshold | default 6 }}
            successThreshold: {{ .Values.worker.readinessProbe.successThreshold | default 1 }}
          lifecycle:
            {{- if .Values.worker.lifecycle }}
            {{- if .Values.worker.gracefulShutdown.enabled }}
            {{- fail "The `worker.lifecycle` configuration conflicts with `worker.gracefulShutdown`. Either disable `worker.gracefulShutdown` and apply the related configurations manually, or remove `worker.lifecycle`." }}
            {{- end }}
            {{- tpl (toYaml .Values.worker.lifecycle) . | nindent 12 }}
            {{- else if .Values.worker.gracefulShutdown.enabled }}
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |-
                    # send shutdown request to worker
                    curl -v -X PUT \
                      -d '"SHUTTING_DOWN"' \
                      -H 'Content-type: application/json' \
                      -H 'X-Trino-User: admin' \
                      http://localhost:{{- .Values.service.port -}}/v1/info/state
                    # wait for shutdown to complete
                    tail --pid=1 -f /dev/null
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      {{- if $workerJmx.exporter.enabled }}
        - name: jmx-exporter
          image: {{ $workerJmx.exporter.image }}
          imagePullPolicy: {{ $workerJmx.exporter.pullPolicy }}
          securityContext:
            {{- toYaml $workerJmx.exporter.securityContext | nindent 12 }}
          args:
            - "{{ $workerJmx.exporter.port }}"
            - /etc/jmx-exporter/jmx-exporter-config.yaml
          volumeMounts:
            - mountPath: /etc/jmx-exporter/
              name: jmx-exporter-config-volume
          resources:
            {{- toYaml $workerJmx.exporter.resources | nindent 12 }}
          ports:
            - name: jmx-exporter
              containerPort: {{ $workerJmx.exporter.port }}
              protocol: TCP
      {{- end }}
      {{- if .Values.sidecarContainers.worker }}
        {{- toYaml .Values.sidecarContainers.worker | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
