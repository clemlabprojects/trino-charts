{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ template "trino.coordinator" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trino.labels" . | nindent 4 }}
  {{- /* merge user annotations and enforce HTTPS backend when internal HTTPS is on */ -}}
  {{- $ingressAnnotations := dict -}}
  {{- range $key, $val := .Values.ingress.annotations }}
  {{- $_ := set $ingressAnnotations $key $val }}
  {{- end }}
  {{- if and $.Values.server.config.https.enabled (not (hasKey $ingressAnnotations "nginx.ingress.kubernetes.io/backend-protocol")) }}
  {{- $_ := set $ingressAnnotations "nginx.ingress.kubernetes.io/backend-protocol" "HTTPS" }}
  {{- end }}
  annotations:
    {{- toYaml $ingressAnnotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ tpl .secretName $ }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "trino.fullname" $ }}
                port:
                  {{- if $.Values.server.config.https.enabled }}
                  number: {{ $.Values.server.config.https.port }}
                  {{- else }}
                  number: {{ $.Values.service.port }}
                  {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
