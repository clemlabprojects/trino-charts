{{- /* On OpenShift with route.enabled (the default) a native Route is emitted instead
       (see route.yaml); suppress the Ingress so the two don't double-expose the app. */ -}}
{{- if and .Values.ingress.enabled (not (and .Values.route.enabled (.Capabilities.APIVersions.Has "route.openshift.io/v1"))) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ollama.fullname" . }}
  labels:
    {{- include "ollama.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "ollama.fullname" $ }}
                port:
                  name: ollama
          {{- end }}
    {{- end }}
{{- end }}
