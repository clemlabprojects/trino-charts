apiVersion: v1
kind: Service
metadata:
  name: {{ include "ollama.fullname" . }}
  labels:
    {{- include "ollama.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "ollama.selectorLabels" . | nindent 4 }}
  ports:
    - name: ollama
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    {{- if .Values.sqlAssistant.enabled }}
    - name: sql-assistant
      port: {{ .Values.sqlAssistant.service.port }}
      targetPort: sa-http
      protocol: TCP
    {{- end }}
