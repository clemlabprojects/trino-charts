apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ollama.fullname" . }}
  labels:
    {{- include "ollama.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ollama.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ollama.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # ── Init containers: seed models before server accepts traffic ─────────
      {{- if or .Values.models.pull .Values.models.seederImage }}
      initContainers:
        {{- if .Values.models.seederImage }}
        # Air-gapped seeder: copy pre-baked model blobs from the seeder image
        # to the PVC.  Uses cp -rn so existing blobs are never overwritten
        # (idempotent across pod restarts when the PVC already has models).
        - name: model-seeder
          image: {{ .Values.models.seederImage }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Seeding model blobs from image to PVC..."
              mkdir -p /root/.ollama/models
              cp -rn /root/.ollama/models/. /pvc-data/models/ 2>/dev/null || true
              echo "Seed complete. Contents:"
              ls /pvc-data/models/ 2>/dev/null || true
          volumeMounts:
            - name: ollama-data
              mountPath: /pvc-data
        {{- end }}
        {{- if .Values.models.pull }}
        - name: model-puller
          image: {{ include "ollama.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              # Start Ollama temporarily for model pull, then stop it
              ollama serve &
              OLLAMA_PID=$!
              sleep 5
              {{- range .Values.models.pull }}
              echo "Pulling model: {{ . }}"
              ollama pull {{ . }} || echo "WARN: failed to pull {{ . }}, continuing"
              {{- end }}
              kill $OLLAMA_PID
              wait $OLLAMA_PID 2>/dev/null || true
              echo "Model pre-pull complete."
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- end }}
      {{- end }}

      containers:
        # ── Ollama server ───────────────────────────────────────────────────
        - name: ollama
          image: {{ include "ollama.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["ollama", "serve"]
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_MODELS
              value: /root/.ollama/models
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            {{- if .Values.gpu.enabled }}
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            {{- end }}
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
              {{- if .Values.gpu.enabled }}
              nvidia.com/gpu: "1"
              {{- end }}

        # ── SQL Assistant semantic service sidecar ──────────────────────────
        {{- if .Values.sqlAssistant.enabled }}
        - name: sql-assistant
          image: {{ .Values.sqlAssistant.image.repository }}:{{ .Values.sqlAssistant.image.tag }}
          imagePullPolicy: {{ .Values.sqlAssistant.image.pullPolicy }}
          ports:
            - name: sa-http
              containerPort: {{ .Values.sqlAssistant.port }}
              protocol: TCP
          env:
            {{- range $key, $val := .Values.sqlAssistant.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.sqlAssistant.port }}
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.sqlAssistant.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.sqlAssistant.resources | nindent 12 }}
          volumeMounts:
            - name: sa-history
              mountPath: /var/lib/sql-assistant
        {{- end }}

      volumes:
        - name: ollama-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ollama.fullname" . }}-models
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.sqlAssistant.enabled }}
        - name: sa-history
          emptyDir: {}
        {{- end }}

      {{- if or .Values.nodeSelector .Values.gpu.enabled }}
      nodeSelector:
        {{- with .Values.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.gpu.enabled }}
        {{- toYaml .Values.gpu.nodeSelector | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
