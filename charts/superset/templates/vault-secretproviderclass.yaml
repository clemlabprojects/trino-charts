{{- if and .Values.global.vault.enabled .Values.vault.csi.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "superset.vault.secretProviderClassName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "superset.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vault
spec:
  provider: vault
  parameters:
    vaultAddress: {{ .Values.global.vault.address | quote }}
    {{- if .Values.global.vault.namespace }}
    vaultNamespace: {{ .Values.global.vault.namespace | quote }}
    {{- end }}
    {{- if eq (default "kubernetes" .Values.global.vault.auth.method | lower) "kubernetes" }}
    roleName: {{ .Values.global.vault.auth.kubernetes.role | quote }}
    vaultKubernetesMountPath: {{ default "kubernetes" .Values.global.vault.auth.mountPath | quote }}
    {{- end }}
    {{- if eq (default "kubernetes" .Values.global.vault.auth.method | lower) "approle" }}
    roleId: {{ .Values.global.vault.auth.approle.roleId | quote }}
    secretId: {{ .Values.global.vault.auth.approle.secretId | quote }}
    vaultAppRoleMountPath: {{ default "approle" .Values.global.vault.auth.mountPath | quote }}
    {{- end }}
    {{- $oidcVaultPath := .Values.global.security.auth.oidc.vaultPath | default "" }}
    {{- $oidcSecretName := (.Values.global.security.auth.oidc.secretRef | default dict).name | default "" }}
    {{- $allObjects := .Values.vault.csi.objects | default "" }}
    {{- if and $oidcVaultPath $oidcSecretName }}
    {{- /* Append OIDC client credential objects so the CSI driver syncs them as env vars */}}
    {{- $oidcObjects := printf "- objectName: %q\n  secretPath: %q\n  secretKey: client_id\n- objectName: %q\n  secretPath: %q\n  secretKey: client_secret" "oidc-client-id" $oidcVaultPath "oidc-client-secret" $oidcVaultPath }}
    {{- $allObjects = printf "%s\n%s" $allObjects $oidcObjects | trimPrefix "\n" }}
    {{- end }}
    {{- if $allObjects }}
    objects: |
{{ $allObjects | indent 6 }}
    {{- end }}
    {{- if .Values.global.vault.csi.caCertSecret }}
    caCertSecretName: {{ .Values.global.vault.csi.caCertSecret | quote }}
    {{- end }}
{{- /* Sync OIDC credentials from Vault to a K8s Secret so secretRef pattern works uniformly */}}
{{- if and $oidcVaultPath $oidcSecretName }}
  secretObjects:
  - secretName: {{ $oidcSecretName | quote }}
    type: Opaque
    data:
    - objectName: "oidc-client-id"
      key: "client_id"
    - objectName: "oidc-client-secret"
      key: "client_secret"
{{- end }}
{{- end }}
