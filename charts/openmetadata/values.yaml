# Default values for the clemlab OpenMetadata chart.
# Aligns with the global.security.* convention used by Trino and Superset.

global:
  imageRegistry: "registry.clemlab.com/clemlabprojects"  # Bitnami subcharts (postgresql)
  dockerRegistry: "registry.clemlab.com/clemlabprojects"  # opensearch-project subchart
  imagePullSecrets: []
  registryOverrides: {}

  security:
    adminUsers: "admin"
    adminGroups: ""

    auth:
      mode: basic   # basic | ldap | oidc
      ldap:
        host: ""
        port: 389
        bindDn: ""
        bindPassword: ""
        userBaseDn: ""
        userSearchFilter: "(uid={0})"
        groupBaseDn: ""
        groupSearchFilter: "(member={0})"
        mailAttribute: "mail"
        lookupType: "SEARCH"   # SEARCH | BIND
        startTls: false
        isSsl: false
      oidc:
        # issuerUrl injected by Ambari dynamicValues (AMBARI_OIDC_ISSUER_URL)
        issuerUrl: ""
        realm: ""
        # JWKS URI — defaults to <issuerUrl>/protocol/openid-connect/certs (Keycloak).
        # Override for non-Keycloak providers.
        jwksUri: ""
        # Display name shown on the OpenMetadata login button
        providerName: "SSO"
        # Ambari OIDC_CREATE_SECRET step writes client_id + client_secret here
        secretRef:
          name: ""
          clientIdKey: "client_id"
          clientSecretKey: "client_secret"
        clientId: ""
        clientSecret: ""
        scopes: "openid email profile"
        redirectUri: ""
        userClaim: "preferred_username"
        groupsClaim: "groups"
        skipTlsVerify: false

    kerberos:
      enabled: true
      injectionMode: WEBHOOK
      realm: EXAMPLE.COM
      configMapName: openmetadata-krb5-conf
      key: krb5.conf
      mountPath: /etc/krb5.conf
      principalMode: headless
      principalFqdnMode: namespace
      principalTemplate: "{service}/{fqdn}@{realm}"
      keytab:
        mountPath: /etc/security/keytabs
        secretDataKey: service.keytab
        secretName: ""

    admissionWebhook:
      injectKeytab:
        enabled: true
        needsKeytabLabelKey: security.clemlab.com/needs-keytab
        serviceLabelKey: security.clemlab.com/service

    tls:
      enabled: false
      truststoreSecret: ""
      truststoreKey: truststore.jks

# -----------------------------------------------------------------------------
# OpenMetadata server image
# -----------------------------------------------------------------------------
# Points to the ODP-built multi-arch image produced by CLEMLAB
# `openmetadata/server` image. Tag pattern: ${app.version}.${bigtop.version}-${odp.stack_build_number}
image:
  registry: "registry.clemlab.com/clemlabprojects"
  repository: "openmetadata"
  tag: "1.12.6.1.3.2.0-2"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

# -- Pod-level security context. fsGroup/fsGroupChangePolicy set by Ambari binding.
podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

serviceAccount:
  create: true
  name: ""
  annotations: {}

service:
  type: ClusterIP
  port: 8585
  adminPort: 8586
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    # Sticky sessions required when replicaCount > 1 (OIDC callback affinity)
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "om-affinity"
    nginx.ingress.kubernetes.io/session-cookie-expires: "10800"
  hosts: []
  tls: []

serviceMonitor:
  enabled: false
  interval: "30s"
  labels: {}
  namespace: ""

# -----------------------------------------------------------------------------
# OpenMetadata server configuration — translated to env vars in the deployment
# -----------------------------------------------------------------------------
openmetadata:
  config:
    # HTTP/HTTPS ports
    port: 8585
    adminPort: 8586

    # TLS — wired by Ambari tls binding
    tls:
      enabled: false
      port: 8443
      keyStorePath: ""
      keyStoreSecretName: ""
      keyStorePasswordSecretName: ""
      keyStoreKey: "keystore.p12"

    # Database (PostgreSQL)
    database:
      # host is templated in configmap: {{ include "openmetadata.dbHost" . }}
      port: 5432
      username: "openmetadata_user"
      driverClass: "org.postgresql.Driver"
      scheme: "postgresql"
      dbName: "openmetadata_db"
      # Password comes from secret-credentials.yaml (key: db-password)

    # Search engine
    elasticsearch:
      # host is templated in configmap: {{ include "openmetadata.opensearchHost" . }}
      port: 9200
      scheme: "http"
      connectionTimeoutSecs: 5
      socketTimeoutSecs: 60
      keepAliveTimeoutSecs: 600
      batchSize: 1000

    # Authentication — provider and params derived from global.security.auth.*
    authentication:
      # callbackUrl / serverUrl injected by Ambari oidc-redirect-uri binding
      callbackUrl: ""
      serverUrl: ""
      jwtTokenExpiryTime: 604800
      jwtPrincipalClaims:
        - "email"
        - "sub"
        - "preferred_username"

    # Authorization
    authorization:
      adminPrincipals:
        - "admin"
      allowedEmailRegistrationDomains: []
      ingestionPrincipals:
        - "ingestion-bot"
      jwtClaimFields:
        - "email"
      # Email domain used when bootstrap-creating admin user records (AUTHORIZER_PRINCIPAL_DOMAIN).
      # OpenMetadata defaults to "open-metadata.org" if unset — leaving that creates placeholder
      # admin emails that won't match real OIDC tokens (causing "Account already exists" on first login).
      # Set this to the email domain your IdP issues for these users (e.g. dev21.hadoop.clemlab.com).
      principalDomain: ""

    # Airflow / pipeline service client — wired by Ambari ingestion-airflow binding
    pipelineServiceClientConfig:
      enabled: false
      apiEndpoint: ""
      healthCheckInterval: 300
      ingestionIpInfoEnabled: false

    # Hadoop connectors — wired by Ambari hive-connector / trino-connector bindings
    connectors:
      hive:
        enabled: false
        metastoreHostPort: ""
      trino:
        enabled: false
        hostPort: ""

# -----------------------------------------------------------------------------
# Bundled Airflow ingestion (optional — disabled by default)
# -----------------------------------------------------------------------------
ingestion:
  enabled: false
  # ODP-built Airflow-based ingestion image — replaces upstream `openmetadata/ingestion`.
  # Produced from the same git ref as the server (see ~/odp-stack do-component-build);
  # OpenMetadata Python packages are installed from local source thanks to
  # patch0-ingestion-from-source.diff.
  image:
    registry: "registry.clemlab.com/clemlabprojects"
    repository: "openmetadata-ingestion"
    tag: "1.12.6.1.3.2.0-2"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  serviceAccount:
    create: true
    name: ""

# -----------------------------------------------------------------------------
# PostgreSQL subchart — overridden to the ODP-built clemlab image at
# registry.clemlab.com/clemlabprojects/bitnami/postgresql:18.0-clemlab-1 (multi-arch,
# PGDG sources, vendored Bitnami chart layout). See odp-stack/bigtop-packages/src/common/bitnami-postgresql/.
postgresql:
  enabled: true
  image:
    tag: "18.0-clemlab-1"
  auth:
    database: "openmetadata_db"
    username: "openmetadata_user"
    # Use a stable default so reinstalls on an existing PVC don't get a mismatched
    # random password. Override via KDPS / existingSecret for production.
    password: "openmetadata"
  primary:
    persistence:
      enabled: true
      size: "50Gi"
      storageClass: ""
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
    # RHEL9 OpenSSL 3.x compiled-in config disables MD5 even without FIPS mode.
    # OpenMetadata migration scripts use MD5() in SQL; bypass the config restriction.
    extraEnvVars:
      - name: OPENSSL_CONF
        value: "/dev/null"
    podSecurityContext:
      fsGroup: 1001
    containerSecurityContext:
      runAsUser: 1001
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]

# External database — used when postgresql.enabled=false
externalDatabase:
  host: ""
  port: 5432
  username: "openmetadata_user"
  database: "openmetadata_db"
  password: ""
  # Name of a pre-existing Secret with key "db-password" (takes precedence over password).
  existingSecret: ""

# -----------------------------------------------------------------------------
# OpenSearch subchart (opensearch-project/opensearch 2.18.0 = OpenSearch 2.12.0)
# Image: opensearchproject/opensearch:2.12.0 — multi-arch (amd64 + arm64)
# Air-gap: global.dockerRegistry routes all images through Harbor
# https://github.com/opensearch-project/helm-charts
# -----------------------------------------------------------------------------
opensearch:
  enabled: true
  clusterName: "openmetadata"
  nodeGroup: "master"
  # masterService defaults to "opensearch-cluster-master" in the subchart values.yaml.
  # Clear it so the Service name is derived from clusterName ("openmetadata-master"),
  # matching what openmetadata.opensearchHost resolves.
  masterService: ""
  image:
    tag: "2.11.1"          # 2.12.0 bundles JDK 21 which crashes (SIGILL) on ARMv8.0 cores
                           # 2.11.1 bundles JDK 17 (ARMv8.0 baseline, aarch64-safe)
  # global.dockerRegistry is set in global.dockerRegistry → Harbor-routed image
  # opensearch sub-chart does not inherit global.imagePullSecrets — the secret
  # name is supplied at deploy time by KDPS via the service.json
  # `imagePullSecretTargets` entry, so this stays declarative.
  imagePullSecrets: []
  singleNode: true
  replicas: 1
  persistence:
    enabled: true
    size: "30Gi"
    storageClass: ""
    imageTag: "1.36"       # busybox tag for the persistence init container (chmod/chown)
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  sysctlInit:
    enabled: true          # sets vm.max_map_count=262144 using busybox init container
    imageTag: "1.36"       # matches the busybox:1.36 already mirrored in Harbor
  extraEnvs:
    - name: DISABLE_INSTALL_DEMO_CONFIG
      value: "true"
    - name: DISABLE_SECURITY_PLUGIN
      value: "true"
  securityConfig:
    enabled: false         # disable opensearch-security plugin (no TLS/auth inside cluster)
  config:
    opensearch.yml: |
      cluster.name: openmetadata
      network.host: 0.0.0.0

# External search — used when opensearch.enabled=false
externalSearch:
  host: ""
  port: 9200
  scheme: "http"

# Ranger TagSync integration (RANGER-4978)
# When enabled, the chart creates a ConfigMap with ranger-tagsync-site.xml
# properties that the Ranger TagSync daemon mounts and uses to poll the
# OpenMetadata REST API for tag/label updates.
ranger:
  tagSync:
    enabled: false
    # Base URL of the OpenMetadata REST API as seen from the Ranger TagSync host.
    # Injected by Ambari from https://<ingressHost>/api when Ingress is enabled.
    endpoint: ""
    # K8s Secret name that holds the OM bot JWT token under key "tagsync-token".
    # When deploying via KDPS/Ambari this is set automatically.
    # For direct Helm installs: leave empty and set token below.
    tokenSecretName: ""
    tokenSecretKey: "tagsync-token"
    # Raw token value — only used when tokenSecretName is empty.
    # The chart creates the Secret from this value and sets resource-policy: keep.
    token: ""
    # FQN of the Trino ingestion service defined in OpenMetadata
    # (used as the instance key in the FQN→Ranger service mapping).
    trinoIngestionServiceFqn: ""
    # Name of the Ranger service of type "trino" where tags will be applied.
    rangerTrinoServiceName: ""
    # ranger.tagsync.source.openmetadatarest.component.tabletype
    componentTableType: "trino"
    # Polling interval in milliseconds (default 230s)
    downloadIntervalMillis: 230000
    # Max entities fetched per page
    entitiesBatchSize: 10000
    # Name of an existing ConfigMap to use instead of creating one.
    # Set by Ambari helm_values_property after KDPS creates/registers the CM.
    configMapName: ""

# =============================================================================
# openmetadata-dependencies sub-chart — Airflow-based ingestion runner.
#
# Off by default. The KDPS form sets `dependencies.enabled=true` when the
# operator enables real federation (e.g. Atlas) or any other feature that
# needs to schedule OM ingestion pipelines.
#
# Every image is pinned to a multi-arch Harbor mirror; no upstream pulls.
# Airflow uses an `airflow_db` database created at install time inside
# OM's existing postgres (see templates/job-airflow-db-bootstrap.yaml).
# =============================================================================
dependencies:
  enabled: false

  mysql:
    enabled: false      # we use OM's own postgres for everything

  opensearch:
    enabled: false      # reuse the OM main chart's opensearch instance

  airflow:
    enabled: true

    # Airflow gets its OWN bundled postgres (separate from the OM main chart's
    # `openmetadata-postgresql`). Upstream openmetadata-dependencies disables
    # this sub-chart AND defaults metadataConnection.host to a literal "mysql"
    # — which DNS-fails because no such service exists — so a fresh install
    # times out at the post-install hook (the airflow migrations Job loops on
    # `Unknown server host 'mysql'`). Two compounding choices fix it:
    #
    #   1. Re-enable airflow's bitnami postgresql sub-chart.
    #   2. Override the bundled postgres' fullnameOverride so it doesn't claim
    #      the `<release>-postgresql` service name that OM's own postgres
    #      already owns (both would race on `openmetadata-postgresql`).
    #   3. Point data.metadataConnection at the renamed bundled postgres so
    #      the migrations Job + scheduler init container connect cleanly.
    #
    # See AMBARI-475 (and the eventual external-DB option) for the rationale.
    postgresql:
      enabled: true
      # Only override the tag — the bitnami sub-chart already templates
      # `{{ global.imageRegistry }}/{{ image.repository }}` and our global
      # imageRegistry resolves to `registry.clemlab.com/clemlabprojects` (set
      # at the OM main chart level). Overriding registry+repository here on
      # top of that produces a doubled path
      # `registry.clemlab.com/clemlabprojects/clemlabprojects/bitnami/postgresql`
      # which doesn't exist on Harbor.
      image:
        tag: "18.0-clemlab-1"
      # CRITICAL: BOTH nameOverride AND fullnameOverride are needed.
      #
      # The OM chart instantiates the bitnami postgresql sub-chart TWICE in
      # the same namespace: once as OM's own metadata store (under
      # `postgresql:` at the top level of values.yaml) and once here as
      # airflow's metadata store. Without nameOverride, both instances label
      # their pods identically — `app.kubernetes.io/name=postgresql` +
      # `instance=<release>` + `component=primary` — because those labels are
      # built from {{ .Chart.Name }} (always "postgresql") and the parent
      # release.
      #
      # The bitnami chart's Service selector is built from the SAME labels.
      # So both Services (openmetadata-postgresql, openmetadata-airflow-postgresql)
      # match BOTH pods. kube-proxy round-robins 50/50 between OM's postgres
      # and airflow's postgres. Half the airflow migrations connect to OM's
      # postgres (no airflow_user → FATAL: password authentication failed
      # for user "airflow_user"), half the OM queries hit airflow's postgres
      # (no openmetadata_user → mirror failure).
      #
      # nameOverride changes `app.kubernetes.io/name` to "airflow-postgresql"
      # — distinct from OM's "postgresql" — so the selectors don't overlap.
      # fullnameOverride keeps the service name predictable for the
      # data.metadataConnection.host below.
      nameOverride: "airflow-postgresql"
      fullnameOverride: "openmetadata-airflow-postgresql"
      auth:
        username: airflow_user
        password: airflow_pass
        database: airflow_db
      primary:
        persistence:
          enabled: true
          size: 10Gi

    data:
      # Mirrors the airflow-postgres credentials above. Set host explicitly to
      # the renamed bundled postgres so the chart's
      # `<release>-postgresql.<ns>` default doesn't kick in and accidentally
      # point at OM's main postgres.
      metadataConnection:
        user: airflow_user
        pass: airflow_pass
        protocol: postgresql
        host: openmetadata-airflow-postgresql
        port: 5432
        db: airflow_db
        sslmode: disable
      resultBackendConnection:
        user: airflow_user
        pass: airflow_pass
        protocol: postgresql
        host: openmetadata-airflow-postgresql
        port: 5432
        db: airflow_db
        sslmode: disable

    # `useStandardNaming: true` is REQUIRED, not optional:
    #
    #   1. With the chart's default `useStandardNaming: false`, every airflow
    #      resource is prefixed with the OM release name alone — e.g. the
    #      airflow ConfigMap becomes `<release>-config`. That collides with
    #      OM main chart's own `<release>-config` ConfigMap
    #      (templates/configmap-config.yaml), and helm install errors with
    #      'no ConfigMap with the name "<release>-config" found' after the
    #      duplicate manifests overwrite each other.
    #
    #   2. OM templates that reference the airflow API server URL
    #      (configmap-config.yaml + job-atlas-federation-wire.yaml) build the
    #      hostname as `{{ .Release.Name }}-airflow-api-server` — which only
    #      resolves when the airflow sub-chart names its Service that way,
    #      i.e. when `useStandardNaming: true`.
    #
    # With this flag on, airflow resources are `<release>-airflow-*` — no
    # collision, OM's hardcoded URLs resolve.
    useStandardNaming: true

    # `registry.secretName` is filled in at deploy time by KDPS using the
    # cluster's actual image-pull-secret name (declared in OPENMETADATA's
    # service.json under `imagePullSecretTargets`). The airflow sub-chart
    # does NOT inherit `global.imagePullSecrets`, so without this override
    # every airflow pod hits ImagePullBackOff on the private Harbor.
    registry:
      secretName: ~

    # Use the bigtop-built airflow image (apache/airflow:3.0.2 + FAB provider 2.4.4
    # + Kerberos client + postgresql-client baked in). Source:
    # ~/odp-stack/bigtop-packages/src/common/airflow/. The bake-in lets us set
    # _PIP_ADDITIONAL_REQUIREMENTS="" below — airgapped ODP clusters cannot reach
    # PyPI at runtime, so the upstream chart's runtime pip install workaround
    # would otherwise hang every migration on `Network is unreachable`.
    defaultAirflowRepository: registry.clemlab.com/clemlabprojects/airflow
    defaultAirflowTag: "3.0.2.1.3.2.0-1"
    defaultAirflowDigest: ~

    images:
      airflow:
        repository: registry.clemlab.com/clemlabprojects/airflow
        tag: "3.0.2.1.3.2.0-1"
        pullPolicy: IfNotPresent
      pod_template:
        repository: registry.clemlab.com/clemlabprojects/airflow
        tag: "3.0.2.1.3.2.0-1"
        pullPolicy: IfNotPresent
      statsd:
        repository: registry.clemlab.com/clemlabprojects/statsd-exporter
        tag: v0.28.0
        pullPolicy: IfNotPresent
      redis:
        repository: registry.clemlab.com/clemlabprojects/redis
        tag: 7.2-bookworm
        pullPolicy: IfNotPresent
      pgbouncer:
        repository: registry.clemlab.com/clemlabprojects/airflow-pgbouncer
        tag: 1.23.1-2025.03.05
        pullPolicy: IfNotPresent
      pgbouncerExporter:
        repository: registry.clemlab.com/clemlabprojects/airflow-pgbouncer-exporter
        tag: 0.18.0-2025.03.05
        pullPolicy: IfNotPresent
      gitSync:
        repository: registry.clemlab.com/clemlabprojects/git-sync
        tag: v4.3.0
        pullPolicy: IfNotPresent

    # Helm merges list-typed values by REPLACEMENT (not deep-merge), so we mirror
    # the openmetadata-dependencies chart's airflow.env list IN FULL here. The
    # single substantive change: `_PIP_ADDITIONAL_REQUIREMENTS` is empty because
    # apache-airflow-providers-fab==2.4.4 is baked into our bigtop-built airflow
    # image (registry.clemlab.com/clemlabprojects/airflow:3.0.2.1.3.2.0-1 — see
    # ~/odp-stack/bigtop-packages/src/common/airflow/). Without this override
    # the OM-deps default triggers a runtime `pip install` from PyPI that fails
    # on airgapped ODP clusters ("Network is unreachable") and stalls every
    # `airflow db migrate` init container.
    env:
      - name: AIRFLOW__API__AUTH_BACKENDS
        value: "airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth"
      - name: AIRFLOW__OPENMETADATA_AIRFLOW_APIS__DAG_GENERATED_CONFIGS
        value: "/opt/airflow/dags"
      - name: AIRFLOW__OPENMETADATA_SECRETS_MANAGER__AWS_REGION
        value: ""
      - name: AIRFLOW__OPENMETADATA_SECRETS_MANAGER__AWS_ACCESS_KEY_ID
        value: ""
      - name: AIRFLOW__OPENMETADATA_SECRETS_MANAGER__AWS_ACCESS_KEY
        value: ""
      - name: _PIP_ADDITIONAL_REQUIREMENTS
        value: ""

    # Use the upstream-default bundled PostgreSQL for Airflow. Previous
    # iterations of this chart consolidated to OM's main PostgreSQL and
    # required a custom airflow-db-bootstrap helm hook Job to create the
    # airflow_db database — the Job became a single point of failure on
    # cross-node networking issues and pushed us away from the upstream
    # design. Reverted: each component gets its own postgres pod.

    airflowLocalDag:
      image:
        repository: registry.clemlab.com/clemlabprojects/openmetadata-ingestion
        tag: "1.12.6.1.3.2.0-24"

    executor: KubernetesExecutor
    scheduler:
      replicas: 1
    # Logs PVC uses ReadWriteMany hardcoded in the airflow sub-chart template
    # (intended for shared NFS/EFS backends so multiple airflow pods can write
    # to the same log dir). On a single-node cluster using local-path
    # (the dev01 default), no RWX provisioner exists — the PVC stays Pending
    # with `failed to provision: NodePath only supports ReadWriteOnce`. Disable
    # persistence and fall back to emptyDir: airflow logs become per-pod and
    # don't survive a pod restart, which is fine for non-prod. Operators with
    # an RWX provisioner can re-enable via override in the wizard.
    logs:
      persistence:
        enabled: false

    triggerer:
      enabled: true
      replicas: 1
    webserver:
      enabled: false   # Airflow 3.x uses apiServer
    pgbouncer:
      enabled: false
    statsd:
      enabled: true
    # Override the OM-dependencies upstream apiServer.extraVolumes entry that
    # uses `airflow.fullname` for the DAGs PVC claimName. That value diverges
    # from what the airflow chart actually creates via the `airflow_dags_volume_claim`
    # helper, which uses `.Release.Name` directly. When useStandardNaming=true
    # (required to avoid the ConfigMap collision with the OM main chart), the
    # mismatch turns into:
    #   - PVC created:       openmetadata-dags
    #   - ApiServer pod ref: openmetadata-airflow-dags
    # → api-server pod stays Pending forever with `persistentvolumeclaim
    # "openmetadata-airflow-dags" not found`. Rewriting the extraVolumes block
    # to use `.Release.Name` matches what the helper produces, so the api-server
    # mounts the right PVC. Upstream bug; fix should land in
    # openmetadata-dependencies/values.yaml eventually.
    apiServer:
      replicas: 1
      extraVolumes:
        - name: dags
          persistentVolumeClaim:
            claimName: '{{ .Release.Name }}-dags'
      extraVolumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags

    dags:
      gitSync:
        enabled: false
    ingress:
      enabled: false

    serviceAccount:
      create: true
      name: openmetadata-airflow

  ingestion:
    image:
      repository: registry.clemlab.com/clemlabprojects/openmetadata-ingestion
      tag: "1.12.6.1.3.2.0-24"

# =============================================================================
# Atlas federation — wires this OM instance to a remote Apache Atlas service.
#
# When `atlasFederation.enabled=true`:
#   - The post-install hook calls OM REST to create:
#       * metadataService 'atlas-<releaseName>'
#       * databaseService 'atlas-<releaseName>-hive' (where Hive entities land)
#       * ingestionPipeline 'atlas-<releaseName>-metadata-ingest' (cron-scheduled)
#   - Requires `dependencies.enabled=true` so the airflow runner exists to
#     execute the pipeline. KDPS flips both together when the form toggle is on.
# =============================================================================
atlasFederation:
  enabled: false

  # Atlas REST endpoint. Used by the OM Atlas connector at ingestion time.
  hostPort: ""        # e.g. https://atlas.example.com:21443

  # Local Atlas user for the OM ingestion bot. Must already exist in
  # users-credentials.properties (or equivalent local auth backend).
  # See seed-atlas-user.sh for the one-shot provisioning script.
  username: "openmetadata-ingestion"

  # Pick ONE of:
  #   - existingSecret (string): name of a pre-existing Secret in this
  #     namespace containing key "password". Recommended.
  #   - password (string): plain-text password; chart bootstraps a Secret.
  existingSecret: ""
  password: ""

  # The OM databaseService(s) where Atlas hive_table entities will be
  # mapped. Use the OM internal DB-service name (e.g. trino-clemlab).
  databaseServiceNames:
    - trino-clemlab

