{{- if .Values.ingress.enabled -}}
{{- $authMode := "" }}
{{- if .Values.global }}{{- if .Values.global.security }}{{- if .Values.global.security.auth }}
{{- $authMode = .Values.global.security.auth.mode | default "" }}
{{- end }}{{- end }}{{- end }}
{{- $needsLargeHeaders := or (eq (lower (toString $authMode)) "oidc") (eq (lower (toString $authMode)) "oauth") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openmetadata.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openmetadata.labels" . | nindent 4 }}
  {{- if or .Values.ingress.annotations $needsLargeHeaders }}
  annotations:
    {{- if $needsLargeHeaders }}
    # OIDC/OAuth: redirect responses carry large state cookies — bump nginx
    # buffers so /login callbacks don't 502 with "upstream sent too big header".
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "32k"
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "ImplementationSpecific" }}
            backend:
              service:
                name: {{ include "openmetadata.fullname" $ }}
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
