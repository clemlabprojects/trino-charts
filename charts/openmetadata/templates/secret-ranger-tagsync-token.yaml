{{- if .Values.ranger.tagSync.enabled -}}
{{/*
Holds the OpenMetadata bot JWT token used by Ranger TagSync to authenticate
against the OM REST API.

The Secret is only created when ranger.tagSync.tokenSecretName is empty
(i.e. no pre-existing Secret was supplied by the operator / Ambari).
When tokenSecretName is set, Ambari has already created the Secret and the
ConfigMap helm_values_property points to it — nothing to render here.
*/}}
{{- if not .Values.ranger.tagSync.tokenSecretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openmetadata.fullname" . }}-ranger-tagsync-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openmetadata.labels" . | nindent 4 }}
    app.kubernetes.io/component: ranger-tagsync-config
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- /* Token value comes from the rangerTagSyncToken variable injected by Ambari. */}}
  {{- /* If absent the Secret is created empty and must be patched before TagSync runs. */}}
  tagsync-token: {{ .Values.ranger.tagSync.token | default "" | b64enc | quote }}
{{- end }}
{{- end }}
