{{/*
Credentials secret: DB password (always), LDAP bind password (if mode=ldap),
OIDC client secret fallback (if secretRef.name is unset and a plain clientSecret is provided).
For OIDC the preferred path is the Ambari-managed secretRef (OIDC_CREATE_SECRET step), which
creates a separate Secret and populates global.security.auth.oidc.secretRef.name.
*/}}
{{- $oidc := .Values.global.security.auth.oidc -}}
{{- $hasOidcFallback := and (eq .Values.global.security.auth.mode "oidc") (empty $oidc.secretRef.name) (not (empty $oidc.clientSecret)) -}}
{{- $hasLdap := and (eq .Values.global.security.auth.mode "ldap") (not (empty .Values.global.security.auth.ldap.bindPassword)) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openmetadata.credentialsSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openmetadata.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.postgresql.enabled }}
  db-password: {{ .Values.postgresql.auth.password | default "" | quote }}
  {{- else if not .Values.externalDatabase.existingSecret }}
  db-password: {{ required "externalDatabase.password is required when postgresql.enabled=false and externalDatabase.existingSecret is empty" .Values.externalDatabase.password | quote }}
  {{- end }}
  {{- if $hasOidcFallback }}
  oidc-client-secret: {{ $oidc.clientSecret | quote }}
  {{- end }}
  {{- if $hasLdap }}
  ldap-bind-password: {{ .Values.global.security.auth.ldap.bindPassword | quote }}
  {{- end }}
