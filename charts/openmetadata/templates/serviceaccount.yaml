{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openmetadata.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openmetadata.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
{{- if and .Values.ingestion.enabled .Values.ingestion.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openmetadata.ingestionServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openmetadata.ingestionLabels" . | nindent 4 }}
automountServiceAccountToken: false
{{- end }}
