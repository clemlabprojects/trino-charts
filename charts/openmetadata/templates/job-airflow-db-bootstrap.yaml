{{- if .Values.dependencies.enabled }}
# -----------------------------------------------------------------------------
# Pre-install Job: create the `airflow_db` database inside OM's existing
# Postgres so the airflow sub-chart can connect.
#
# Owned by openmetadata_user (which already has CREATEDB). Idempotent —
# safe to re-run on helm upgrade.
#
# Hook order: post-install of OM's main postgres but pre-install of the
# airflow components. Helm guarantees that within hook-weight ordering;
# we use weight=-5 so this Job runs after postgresql's own bootstrap (which
# has weight 0 or higher) and before airflow tries to connect.
# -----------------------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "openmetadata.fullname" . }}-airflow-db-bootstrap
  labels:
    {{- include "openmetadata.labels" . | nindent 4 }}
    app.kubernetes.io/component: airflow-db-bootstrap
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "openmetadata.labels" . | nindent 8 }}
        app.kubernetes.io/component: airflow-db-bootstrap
    spec:
      restartPolicy: OnFailure
      {{- with (include "openmetadata.imagePullSecrets" .) }}
      imagePullSecrets:
        {{- . | nindent 8 }}
      {{- end }}
      containers:
        - name: psql
          image: "{{ .Values.global.imageRegistry }}/bitnami/postgresql:17.10-clemlab-1"
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: "openmetadata-postgresql"
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: "openmetadata_user"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: openmetadata-postgresql
                  key: password
            - name: PGDATABASE
              value: "openmetadata_db"
          command:
            - sh
            - -c
            - |
              set -eu
              echo "Waiting for postgres at $PGHOST:$PGPORT..."
              until psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d postgres -c 'SELECT 1' >/dev/null 2>&1; do
                sleep 2
              done
              echo "Postgres is up."

              # Create airflow_db if missing (idempotent)
              if ! psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='airflow_db'" | grep -q 1; then
                echo "Creating airflow_db..."
                psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d postgres -c "CREATE DATABASE airflow_db"
              else
                echo "airflow_db already exists; nothing to do."
              fi

              # Sanity: connect to it and check the basic privileges
              psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d airflow_db -c "SELECT current_database(), current_user;"
              echo "airflow_db bootstrap complete."
{{- end }}
