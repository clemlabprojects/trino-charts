{{- if and .Values.atlasFederation.enabled (not .Values.atlasFederation.existingSecret) }}
{{- /*
  Atlas-bot password Secret.

  Three states:
    a) operator provided existingSecret  → this template is skipped.
    b) operator typed a password on the form (.password is set) → we
       use it verbatim. (Kept for migration/compat — the form no longer
       exposes a password field.)
    c) nothing supplied → generate a random password.
       To stay idempotent across helm upgrade/rollback, we lookup the
       existing Secret first and reuse its password if it's there. Only
       the FIRST install creates a fresh random one.

  helm.sh/resource-policy: keep prevents `helm uninstall` from wiping
  the password (otherwise reinstall+forget would rotate it under our feet).
*/}}
{{- $name := printf "%s-atlas-credentials" (include "openmetadata.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $pwd := "" -}}
{{- if .Values.atlasFederation.password }}
  {{- $pwd = .Values.atlasFederation.password -}}
{{- else if $existing }}
  {{- $pwd = (index $existing.data "password" | b64dec) -}}
{{- else }}
  {{- $pwd = randAlphaNum 24 -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "openmetadata.labels" . | nindent 4 }}
    app.kubernetes.io/component: atlas-federation
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  password: {{ $pwd | quote }}
{{- end }}
