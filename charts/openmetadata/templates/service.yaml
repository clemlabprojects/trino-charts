apiVersion: v1
kind: Service
metadata:
  name: {{ include "openmetadata.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openmetadata.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.adminPort }}
      targetPort: admin
      protocol: TCP
      name: admin
    {{- if .Values.openmetadata.config.tls.enabled }}
    - port: {{ .Values.openmetadata.config.tls.port }}
      targetPort: https
      protocol: TCP
      name: https
    {{- end }}
  selector:
    {{- include "openmetadata.selectorLabels" . | nindent 4 }}
